    <script>
      const questions = [
        {
          english: "Geothermal?",
          answers: ["Géothermique"],
        },
        {
          english:
            "It's silent, that's actually one of the main selling points.",
          answers: [
            "C'est silencieux, c'est même un peu le principal argument",
          ],
        },
        {
          english: "Right.",
          answers: ["Bon"],
        },
        {
          english: "It's kind of a natural thermostat.",
          answers: ["C'est un peu un thermostat naturel, quoi"],
        },
        {
          english:
            "They pump it up, heat the buildings, and reinject the water.",
          answers: [
            "Ils pompent, ils chauffent les immeubles, et ils réinjectent l'eau",
          ],
        },
        {
          english: "And in practice, what do they actually do with it?",
          answers: ["Et concrètement, ils font quoi avec ça"],
        },
        {
          english: "But the idea of using the ground's heat, no, not at all.",
          answers: [
            "Mais l'idée d'utiliser la chaleur du sol, alors là, pas du tout",
          ],
        },
        {
          english:
            "What they're using is just the fact that three meters underground, the temperature barely moves all year.",
          answers: [
            "Eux, ils exploitent juste le fait qu'à trois mètres sous terre, la température, elle bouge quasiment pas de l'année",
          ],
          note: "sous terre = underground; bouger here means to shift/budge, not the more common 'to move (house)'",
        },
        {
          english: "And the price?",
          answers: ["Et le prix, alors"],
        },
        {
          english: "...and my rose bushes?",
          answers: ["Et mes rosiers", "...et mes rosiers"],
        },
      ];
    </script>
