    <script>
      const questions = [
        {
          english: "What are you doing today?",
          answers: ["Tu fais quoi aujourd'hui", "Qu'est-ce que tu fais aujourd'hui"],
        },
        {
          english: "I woke up feeling great.",
          answers: ["Je me suis réveillée en pleine forme"],
        },
        {
          english: "We're going to publish it on Amazon next month.",
          answers: ["On va le publier sur Amazon le mois prochain"],
        },
        {
          english:
            "It's about two guards who watch over a gorge where, unbeknownst to them, a private company is running secret experiments.",
          answers: [
            "Ça parle de deux gardes qui surveillent une gorge où, sans qu'ils le sachent, une boîte privée mène des expériences secrètes",
          ],
        },
        {
          english: "Did you take any medication?",
          answers: ["Tu as pris des médicaments"],
        },
        {
          english: "So we're working with Claude on the historical accuracy.",
          answers: ["Du coup, on bosse avec Claude pour l'exactitude historique"],
        },
        { english: "That's a great idea.", answers: ["C'est une super idée"] },
        {
          english: "So I'm taking it easy today.",
          answers: [
            "Du coup, je reste tranquille aujourd'hui",
            "Donc je reste tranquille aujourd'hui",
          ],
        },
        {
          english: "The human body is really strange.",
          answers: ["Le corps humain, c'est vraiment bizarre"],
        },
        {
          english: "What else did you do yesterday?",
          answers: ["Tu as fait quoi d'autre hier"],
        },
        { english: "Yes.", answers: ["Oui"] },
        {
          english: "I alternated heat and cold on my back.",
          answers: ["J'ai alterné le chaud et le froid sur le dos"],
        },
      ];
