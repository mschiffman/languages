<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Dictation - 10 Levels</title>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-CHXHM9CZKM");
    </script>
    <link href="/img/favicon.png" rel="icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
      }
      .dictation-card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        width: 100%;
      }
      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 10px;
      }
      .level-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        background: #f8f9fa;
        padding: 10px;
        border-radius: 8px;
      }
      .level-btn {
        background: white;
        border: 1px solid #dcdcdc;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        color: #7f8c8d;
        transition: all 0.2s;
      }
      .level-btn:hover {
        background: #ecf0f1;
        color: #2c3e50;
      }
      .level-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .level-indicator {
        font-weight: bold;
        color: #3498db;
        text-transform: uppercase;
        font-size: 0.9rem;
      }
      .audio-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }
      .btn-audio {
        background: #e1f5fe;
        color: #0288d1;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-audio:hover {
        background: #b3e5fc;
        transform: scale(1.05);
      }
      .btn-slow {
        background: #fff3e0;
        color: #f57c00;
      }
      .btn-slow:hover {
        background: #ffe0b2;
      }
      .btn-hint {
        background: #f3e5f5;
        color: #8e24aa;
      }
      .btn-hint:hover {
        background: #e1bee7;
      }
      #player {
        display: none;
      }
      .hint-box {
        display: none;
        margin: -10px 0 20px;
        padding: 12px 15px;
        border-radius: 8px;
        background: #f3e5f5;
        color: #6a1b9a;
        font-style: italic;
        text-align: center;
      }
      .hint-box.visible {
        display: block;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1.1rem;
        font-family: "Segoe UI", sans-serif;
        resize: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }
      textarea:focus {
        outline: none;
        border-color: #3498db;
      }
      .feedback-area {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background: #fafafa;
        border: 1px dashed #ccc;
        min-height: 40px;
        font-size: 1.1rem;
        line-height: 1.6;
      }
      .diff-correct {
        color: #27ae60;
        font-weight: bold;
      }
      .diff-missing {
        color: #c0392b;
        text-decoration: line-through;
        opacity: 0.6;
        margin-right: 5px;
      }
      .diff-added {
        color: #2980b9;
        text-decoration: underline;
        font-weight: bold;
      }
      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }
      button.action-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-check {
        background: #2ecc71;
        color: white;
      }
      .btn-check:hover {
        background: #27ae60;
      }
      .btn-reveal {
        background: #f39c12;
        color: white;
      }
      .btn-reset {
        background: #95a5a6;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="dictation-card">
      <h2>🎧 Listening Lab</h2>
      <div class="level-bar">
        <button class="level-btn" id="prev-btn" onclick="changeLevel(-1)">
          ◀ Prev
        </button>
        <span class="level-indicator" id="level-display">Level 1 / 10</span>
        <button class="level-btn" id="next-btn" onclick="changeLevel(1)">
          Next ▶
        </button>
      </div>
      <div class="audio-controls">
        <button class="btn-audio" onclick="playAudio('m')">
          <span>👨</span> Male
        </button>
        <button class="btn-audio btn-slow" onclick="playAudio('f')">
          <span>👩</span> Female
        </button>
        <button class="btn-audio btn-hint" onclick="toggleHint()">
          <span>💡</span> Hint
        </button>
      </div>
      <audio id="player"></audio>
      <div class="hint-box" id="hint-box"></div>
      <textarea id="user-input" placeholder="Type what you hear..."></textarea>
      <div id="feedback" class="feedback-area">
        <span style="color: #aaa; font-style: italic"
          >Feedback will appear here...</span
        >
      </div>
      <div class="controls">
        <button class="action-btn btn-check" onclick="checkDictation()">
          Check
        </button>
        <button class="action-btn btn-reset" onclick="resetDictation()">
          Reset
        </button>
        <button class="action-btn btn-reveal" onclick="revealAnswer()">
          Reveal
        </button>
      </div>
    </div>

    <script>
      const sentences = [
        "Tu fais quoi aujourd'hui ?",
        "Le corps humain, c'est vraiment bizarre.",
        "Tu as fait quoi d'autre hier ?",
        "Y a plein de suspense.",
        "Ça a commencé hier.",
        "On va le publier sur Amazon le mois prochain.",
        "Intéressant.",
        "Je dois encore en prendre pendant quelques jours.",
        "C'est passionnant.",
        "Ça parle de quoi, le film ?",
        "Et normalement il va encore pleuvoir aujourd'hui.",
        "C'est génial.",
        "On a mangé une soupe aux boulettes avec une salade.",
        "Mais à part ça, je peux faire les autres tâches du quotidien,",
        "genre faire le lit, essuyer le plan de travail et arroser les plantes.",
        "C'est tout simplement brillant.",
        "Je veux commencer à parler français à la maison.",
        "J'ai mal au dos.",
        "Un peu mieux qu'hier, mais j'ai toujours mal.",
        "Et j'ai un peu étudié aussi.",
        "C'est divertissant.",
        "Quand je me suis penchée pour ramasser un bidon d'un gallon,",
        "ça s'est mis à faire mal d'un coup.",
        "Robert bosse déjà sur un autre.",
        "Oui.",
        "Ça fait combien de jours que tu as mal comme ça ?",
        "Vous allez le publier quand ?",
        "Ça parle de deux gardes qui surveillent une gorge où,",
        "sans qu'ils le sachent,",
        "une boîte privée mène des expériences secrètes.",
        "Oui, j'ai pris du Celebrex.",
        "Ça parle d'un médecin au 19e siècle et de ses aventures de voyage.",
        "L'abonnement était offert avec une carte de crédit que Robert a prise le mois dernier.",
        "Non, il a plu cette nuit.",
        "Du coup, on bosse avec Claude pour l'exactitude historique.",
        "Vous avez mangé quoi hier soir ?",
        "Ça fait plus mal quand je fais la vaisselle, alors c'est Robert qui finit par la faire.",
        "Robert a enfin fini son roman.",
        "J'ai étudié des conversations du quotidien",
        "et j'ai fait des exercices de traduction et de compréhension orale.",
        "Pas grand-chose.",
        "Tu te sens comment aujourd'hui ?",
        "Oh, comme d'hab, j'ai bossé sur mon site de français.",
        "Je te le recommande.",
        "Je me suis réveillée en pleine forme, et puis je suis sortie arroser les plantes.",
        "On est pas pressés.",
        "C'est un thriller ?",
        "Et j'ai alterné le chaud et le froid sur le dos, et j'ai fait des étirements.",
        "J'imagine bien.",
        "Ça s'appelle « The Gorge ».",
        "Tu as pris des médicaments ?",
        "Ça parle de quoi, le roman ?",
        "Ensuite, on a regardé un film sur Apple TV.",
        "Tu arroses les plantes aujourd'hui ?",
        "C'est un conteur né.",
        "C'est une super idée.",
        "Du coup, je reste tranquille aujourd'hui.",
        "Tu as fait quoi d'autre hier ?",
        "Tu as étudié quoi ?",
      ];

      const translations = [
        "What are you doing today?",
        "The human body is really strange.",
        "What else did you do yesterday?",
        "There's plenty of suspense.",
        "It started yesterday.",
        "We're going to publish it on Amazon next month.",
        "Interesting.",
        "I still need to take it for a few more days.",
        "It's fascinating.",
        "What's the movie about?",
        "And it's supposed to rain again today.",
        "That's great.",
        "We had meatball soup with a salad.",
        "But apart from that, I can do the other everyday tasks,",
        "like making the bed, wiping down the counter, and watering the plants.",
        "It's simply brilliant.",
        "I want to start speaking French at home.",
        "My back hurts.",
        "A little better than yesterday, but I still hurt.",
        "And I studied a bit too.",
        "It's entertaining.",
        "When I bent down to pick up a gallon jug,",
        "it suddenly started hurting.",
        "Robert's already working on another one.",
        "Yes.",
        "How many days have you had pain like this?",
        "When are you going to publish it?",
        "It's about two guards watching over a gorge where,",
        "unbeknownst to them,",
        "a private company is running secret experiments.",
        "Yes, I took some Celebrex.",
        "It's about a doctor in the 19th century and his travel adventures.",
        "The subscription came free with a credit card Robert got last month.",
        "No, it rained last night.",
        "So we're working with Claude on the historical accuracy.",
        "What did you have for dinner last night?",
        "It hurts more when I do the dishes, so Robert ends up doing them.",
        "Robert finally finished his novel.",
        "I studied everyday conversations",
        "and did some translation and listening comprehension exercises.",
        "Not much.",
        "How are you feeling today?",
        "Oh, as usual, I worked on my French website.",
        "I recommend it.",
        "I woke up feeling great, and then I went outside to water the plants.",
        "We're in no hurry.",
        "Is it a thriller?",
        "And I alternated heat and cold on my back, and I did some stretches.",
        "I can imagine.",
        'It\'s called "The Gorge".',
        "Did you take any medication?",
        "What's the novel about?",
        "Then we watched a movie on Apple TV.",
        "Are you watering the plants today?",
        "He's a born storyteller.",
        "That's a great idea.",
        "So I'm taking it easy today.",
        "What else did you do yesterday?",
        "What did you study?",
      ];

      let currentIndex = 0;
      const audioBase =
        "https://languages.rmlives.com/lessons/everyday/conv36/listen/";

      function changeLevel(direction) {
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= sentences.length)
          currentIndex = sentences.length - 1;
        updateUI();
        resetDictation();
      }

      function updateUI() {
        document.getElementById("level-display").innerText =
          `Level ${currentIndex + 1} / ${sentences.length}`;
        document.getElementById("prev-btn").disabled = currentIndex === 0;
        document.getElementById("next-btn").disabled =
          currentIndex === sentences.length - 1;
      }

      function playAudio(gender) {
        const num = String(currentIndex + 1).padStart(2, "0");
        const player = document.getElementById("player");
        player.src = `${audioBase}${num}-${gender}.mp3`;
        player.play();
      }

      function checkDictation() {
        const userText = document.getElementById("user-input").value.trim();
        const feedbackDiv = document.getElementById("feedback");
        if (!userText) {
          feedbackDiv.innerHTML =
            '<span style="color:#e74c3c">Please type something first!</span>';
          return;
        }
        feedbackDiv.innerHTML = compareStrings(
          sentences[currentIndex],
          userText,
        );
      }

      function revealAnswer() {
        document.getElementById("user-input").value = sentences[currentIndex];
        checkDictation();
      }

      function resetDictation() {
        document.getElementById("user-input").value = "";
        document.getElementById("feedback").innerHTML =
          '<span style="color:#aaa; font-style:italic;">Feedback will appear here...</span>';
        const hintBox = document.getElementById("hint-box");
        hintBox.classList.remove("visible");
        hintBox.innerText = "";
      }

      function toggleHint() {
        const hintBox = document.getElementById("hint-box");
        if (hintBox.classList.contains("visible")) {
          hintBox.classList.remove("visible");
        } else {
          hintBox.innerText = translations[currentIndex];
          hintBox.classList.add("visible");
        }
      }

      function compareStrings(correct, user) {
        let html = "";
        const correctWords = correct.split(" ");
        const userWords = user.split(" ");
        const maxLength = Math.max(correctWords.length, userWords.length);
        for (let i = 0; i < maxLength; i++) {
          const cWord = correctWords[i] || "";
          const uWord = userWords[i] || "";
          const cleanC = cWord.toLowerCase().replace(/[.,?!]/g, "");
          const cleanU = uWord.toLowerCase().replace(/[.,?!]/g, "");
          if (cleanC === cleanU) {
            html += `<span class="diff-correct">${cWord}</span> `;
          } else {
            if (cWord) html += `<span class="diff-added">${cWord}</span> `;
            if (uWord) html += `<span class="diff-missing">${uWord}</span> `;
          }
        }
        return html;
      }

      updateUI();
    </script>
    <script src="/assets/js/exercise-feedback.js"></script>
    <script type="module" src="../../../../assets/js/nav-utensils.js"></script>
  </body>
</html>
