<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Translation Quiz</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-CHXHM9CZKM");
    </script>
    <link href="/img/favicon.png" rel="icon" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../../../../assets/css/translation.css" />
  </head>
  <body>
    <div class="translation-card">
      <h2>✍️ Translation Challenge (Page 1)</h2>
      <p class="subtitle">Translate the sentences into French. (Watch your spelling!)</p>
      <div id="quiz-area"></div>
      <div class="btn-row">
        <button class="btn-verify" onclick="checkTranslations()">Check Answers</button>
        <button class="btn-reset" onclick="resetTranslations()">Reset</button>
      </div>
      <div class="page-nav">
        <a href="translation1.html" class="page-btn active">1</a>
        <a href="translation2.html" class="page-btn">2</a>
        <a href="translation3.html" class="page-btn">3</a>
        <a href="translation4.html" class="page-btn">4</a>
        <a href="translation5.html" class="page-btn">5</a>
      </div>
    </div>
    <script>
      const questions = [
        { english: "When they see the amounts, their honesty is going to be put to a serious test.", answers: ["Quand ils verront les montants, leur honnêteté va être mise à rude épreuve"] },
        { english: "Okay, let me tell you a true story.", answers: ["Bon, laisse-moi te raconter une histoire vraie"] },
        { english: "I don't really know what to do.", answers: ["Je sais pas trop quoi faire", "Je ne sais pas trop quoi faire"] },
        { english: "That way, the scammers can only con someone once, and their reputation is ruined.", answers: ["Comme ça, les escrocs peuvent arnaquer qu'une seule fois, et leur réputation est foutue"] },
        { english: "Why doesn't he go to the police?", answers: ["Pourquoi il va pas voir la police", "Pourquoi il ne va pas voir la police"] },
        { english: "He couldn't even sue him, even though they both lived in the United States.", answers: ["Il pouvait même pas le poursuivre en justice, alors qu'ils vivaient tous les deux aux États-Unis", "Il ne pouvait même pas le poursuivre en justice, alors qu'ils vivaient tous les deux aux États-Unis"] },
        { english: "They say every man has a price, right?", answers: ["On dit que tout homme a un prix, non"] },
        { english: "Yes, but they travel a lot.", answers: ["Oui, mais ils sont souvent en déplacement"] },
        { english: "No paper trail, no signed receipt, nothing.", answers: ["Pas de trace écrite, pas de signature de réception, rien"] },
        { english: "Yeah, let's do that.", answers: ["Ouais, faisons ça"] },
      ];
    </script>
    <script>
      function renderQuiz() {
        const quizArea = document.getElementById("quiz-area");
        quizArea.innerHTML = questions.map((q, index) => `
          <div class="question-block" id="block-${index + 1}">
            <span class="english-prompt">${index + 1}. ${q.english}</span>
            <div class="input-wrap">
              <input type="text" class="user-input" id="q${index + 1}" placeholder="Type here..." />
              <i class="bi bi-check-circle-fill check-icon"></i>
            </div>
            <div class="feedback-msg" id="msg-${index + 1}"></div>
          </div>
        `).join("");
      }
      function normalizeAnswer(value) {
        return value.trim().toLowerCase().replace(/[.?!]$/u, "");
      }
      function checkTranslations() {
        questions.forEach((question, index) => {
          const inputId = "q" + (index + 1);
          const blockEl = document.getElementById("block-" + (index + 1));
          const msgEl = document.getElementById("msg-" + (index + 1));
          const userVal = normalizeAnswer(document.getElementById(inputId).value);
          const isCorrect = question.answers.some((answer) => userVal === normalizeAnswer(answer));
          blockEl.classList.toggle("correct-block", isCorrect);
          blockEl.classList.toggle("wrong-block", !isCorrect);
          msgEl.style.display = "block";
          msgEl.style.color = isCorrect ? "#27ae60" : "#c0392b";
          msgEl.innerText = isCorrect ? "✅ Correct!" : `❌ Correction: "${question.answers[0]}"`;
        });
      }
      function resetTranslations() {
        questions.forEach((_, index) => {
          document.getElementById("q" + (index + 1)).value = "";
          document.getElementById("block-" + (index + 1)).classList.remove("correct-block", "wrong-block");
          document.getElementById("msg-" + (index + 1)).style.display = "none";
        });
      }
      renderQuiz();
    </script>
    <script type="module" src="../../../../assets/js/nav-utensils.js"></script>
  </body>
</html>
