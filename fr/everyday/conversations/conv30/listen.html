<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Dictation - 10 Levels</title>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-CHXHM9CZKM");
    </script>
    <link href="/img/favicon.png" rel="icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
      }
      .dictation-card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        width: 100%;
      }
      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 10px;
      }
      .level-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        background: #f8f9fa;
        padding: 10px;
        border-radius: 8px;
      }
      .level-btn {
        background: white;
        border: 1px solid #dcdcdc;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        color: #7f8c8d;
        transition: all 0.2s;
      }
      .level-btn:hover {
        background: #ecf0f1;
        color: #2c3e50;
      }
      .level-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .level-indicator {
        font-weight: bold;
        color: #3498db;
        text-transform: uppercase;
        font-size: 0.9rem;
      }
      .audio-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }
      .btn-audio {
        background: #e1f5fe;
        color: #0288d1;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-audio:hover {
        background: #b3e5fc;
        transform: scale(1.05);
      }
      .btn-slow {
        background: #fff3e0;
        color: #f57c00;
      }
      .btn-slow:hover {
        background: #ffe0b2;
      }
      .btn-hint {
        background: #f3e5f5;
        color: #8e24aa;
      }
      .btn-hint:hover {
        background: #e1bee7;
      }
      #player {
        display: none;
      }
      .hint-box {
        display: none;
        margin: -10px 0 20px;
        padding: 12px 15px;
        border-radius: 8px;
        background: #f3e5f5;
        color: #6a1b9a;
        font-style: italic;
        text-align: center;
      }
      .hint-box.visible {
        display: block;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1.1rem;
        font-family: "Segoe UI", sans-serif;
        resize: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }
      textarea:focus {
        outline: none;
        border-color: #3498db;
      }
      .feedback-area {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background: #fafafa;
        border: 1px dashed #ccc;
        min-height: 40px;
        font-size: 1.1rem;
        line-height: 1.6;
      }
      .diff-correct {
        color: #27ae60;
        font-weight: bold;
      }
      .diff-missing {
        color: #c0392b;
        text-decoration: line-through;
        opacity: 0.6;
        margin-right: 5px;
      }
      .diff-added {
        color: #2980b9;
        text-decoration: underline;
        font-weight: bold;
      }
      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }
      button.action-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-check {
        background: #2ecc71;
        color: white;
      }
      .btn-check:hover {
        background: #27ae60;
      }
      .btn-reveal {
        background: #f39c12;
        color: white;
      }
      .btn-reset {
        background: #95a5a6;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="dictation-card">
      <h2>🎧 Listening Lab</h2>
      <div class="level-bar">
        <button class="level-btn" id="prev-btn" onclick="changeLevel(-1)">
          ◀ Prev
        </button>
        <span class="level-indicator" id="level-display">Level 1 / 10</span>
        <button class="level-btn" id="next-btn" onclick="changeLevel(1)">
          Next ▶
        </button>
      </div>
      <div class="audio-controls">
        <button class="btn-audio" onclick="playAudio('m')">
          <span>👨</span> Male
        </button>
        <button class="btn-audio btn-slow" onclick="playAudio('f')">
          <span>👩</span> Female
        </button>
        <button class="btn-audio btn-hint" onclick="toggleHint()">
          <span>💡</span> Hint
        </button>
      </div>
      <audio id="player"></audio>
      <div class="hint-box" id="hint-box"></div>
      <textarea id="user-input" placeholder="Type what you hear..."></textarea>
      <div id="feedback" class="feedback-area">
        <span style="color: #aaa; font-style: italic"
          >Feedback will appear here...</span
        >
      </div>
      <div class="controls">
        <button class="action-btn btn-check" onclick="checkDictation()">
          Check
        </button>
        <button class="action-btn btn-reset" onclick="resetDictation()">
          Reset
        </button>
        <button class="action-btn btn-reveal" onclick="revealAnswer()">
          Reveal
        </button>
      </div>
    </div>

    <script>
      const sentences = [
        "Quand ils verront les montants, leur honnêteté va être mise à rude épreuve.",
        "Bon, laisse-moi te raconter une histoire vraie.",
        "Je sais pas trop quoi faire.",
        "Comme ça, les escrocs peuvent arnaquer qu'une seule fois, et leur réputation est foutue.",
        "Pourquoi il va pas voir la police ?",
        "Il pouvait même pas le poursuivre en justice, alors qu'ils vivaient tous les deux aux États-Unis.",
        "On dit que tout homme a un prix, non ?",
        "Oui, mais ils sont souvent en déplacement.",
        "Pas de trace écrite, pas de signature de réception, rien.",
        "Ouais, faisons ça.",
        "Bon, si je te raconte tout ça, c'est parce que ce service de domiciliation aux États-Unis dont tu parles, ça me met pas à l'aise.",
        "Et puis un jour, il envoie une grosse somme.",
        "Eux, j'ai confiance.",
        "Ça remonte à plus de dix ans.",
        "Ce que font les Birmans dans un pays où la loi peut pas les protéger, c'est qu'ils balancent leur histoire sur Facebook.",
        "Je comprends ce que tu veux dire.",
        "Pas un seul pépin.",
        "Y aura peut-être du courrier de nos banques ou de nos placements.",
        "Pas de traces, pas de signatures.",
        "Tu te souviens du médecin aux États-Unis qui avait envoyé 100 000 dollars à son intermédiaire hundi habituel ?",
        "Elle s'est tirée avec le fric.",
        "Ben, moi, cet arrangement me rend méfiante.",
        "À l'époque, y avait pas Facebook au Myanmar.",
        "C'est vrai.",
        "J'imagine, ouais.",
        "Ils vont ouvrir tout notre courrier.",
        "Ce service repose sur la confiance.",
        "La commodité vaut pas le risque.",
        "Waouh, c'est brutal.",
        "Du coup, il pouvait rien faire.",
        "Pourquoi on demanderait pas à Larry et Carol ?",
        "Avec photos, noms des conjoints, adresses, numéros de téléphone.",
        "C'est une sacrée somme, quand même.",
        "Un Birman utilisait un service de hundi depuis cinq ans.",
        "On va y réfléchir.",
        "Le type a disparu.",
        "Moi, je pensais juste au moyen le plus pratique de garder nos permis de conduire américains.",
        "Il peut pas.",
        "Notre courrier va traîner chez eux pendant des jours.",
        "Même histoire.",
        "Alors, qu'est-ce qu'il a fait ?",
        "Ils auront nos infos sensibles, genre les numéros de sécurité sociale.",
        "Brutal, mais efficace.",
        "La femme du hundi disparaît.",
        "Et il est devenu quoi, le médecin ?",
        "C'est moche.",
      ];

      const translations = [
        "When they see the amounts, their honesty is going to be put to a serious test.",
        "Okay, let me tell you a true story.",
        "I don't really know what to do.",
        "That way, the scammers can only con someone once, and their reputation is ruined.",
        "Why doesn't he go to the police?",
        "He couldn't even sue him, even though they both lived in the United States.",
        "They say every man has a price, right?",
        "Yes, but they travel a lot.",
        "No paper trail, no signed receipt, nothing.",
        "Yeah, let's do that.",
        "Well, the reason I'm telling you all this is that this mail-forwarding service in the United States you're talking about makes me uneasy.",
        "Then one day, he sends a large sum.",
        "I trust them.",
        "That was more than ten years ago.",
        "What Burmese people do in a country where the law can't protect them is post their story on Facebook.",
        "I understand what you mean.",
        "Not a single hitch.",
        "There might be mail from our banks or investments.",
        "No records, no signatures.",
        "Do you remember the doctor in the United States who sent 100,000 dollars to his usual hundi intermediary?",
        "She took off with the money.",
        "Well, this arrangement makes me suspicious.",
        "Back then, there was no Facebook in Myanmar.",
        "That's true.",
        "I guess so, yeah.",
        "They're going to open all our mail.",
        "This kind of service relies on trust.",
        "Convenience isn't worth the risk.",
        "Wow, that's brutal.",
        "So he couldn't do anything.",
        "Why don't we ask Larry and Carol?",
        "With photos, spouses' names, addresses, phone numbers.",
        "That's quite a sum, too.",
        "A Burmese man had been using a hundi service for five years.",
        "We'll think about it.",
        "The guy disappeared.",
        "I was just thinking about the most practical way to keep our American driver's licenses.",
        "He can't.",
        "Our mail would sit at their place for days.",
        "Same story.",
        "So, what did he do?",
        "They'll have our sensitive information, like our social security numbers.",
        "Brutal, but effective.",
        "The hundi woman disappears.",
        "And what happened to the doctor?",
        "That's awful.",
      ];

      const audioNums = [
        34, 3, 42, 16, 9, 25, 1, 39, 12, 45, 30, 6, 38, 21, 14, 44, 5, 33, 27,
        19, 8, 36, 23, 41, 2, 31, 11, 46, 17, 24, 37, 15, 29, 4, 43, 20, 35, 10,
        40, 26, 13, 32, 18, 7, 22, 28,
      ];

      let currentIndex = 0;
      const audioBase =
        "https://languages.rmlives.com/lessons/everyday/conv30/listen/";

      function changeLevel(direction) {
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= sentences.length)
          currentIndex = sentences.length - 1;
        updateUI();
        resetDictation();
      }

      function updateUI() {
        document.getElementById("level-display").innerText =
          `Level ${currentIndex + 1} / ${sentences.length}`;
        document.getElementById("prev-btn").disabled = currentIndex === 0;
        document.getElementById("next-btn").disabled =
          currentIndex === sentences.length - 1;
      }

      function playAudio(gender) {
        const num = String(audioNums[currentIndex]).padStart(2, "0");
        const player = document.getElementById("player");
        player.src = `${audioBase}${num}-${gender}.mp3`;
        player.play();
      }

      function checkDictation() {
        const userText = document.getElementById("user-input").value.trim();
        const feedbackDiv = document.getElementById("feedback");
        if (!userText) {
          feedbackDiv.innerHTML =
            '<span style="color:#e74c3c">Please type something first!</span>';
          return;
        }
        feedbackDiv.innerHTML = compareStrings(
          sentences[currentIndex],
          userText,
        );
      }

      function revealAnswer() {
        document.getElementById("user-input").value = sentences[currentIndex];
        checkDictation();
      }

      function resetDictation() {
        document.getElementById("user-input").value = "";
        document.getElementById("feedback").innerHTML =
          '<span style="color:#aaa; font-style:italic;">Feedback will appear here...</span>';
        const hintBox = document.getElementById("hint-box");
        hintBox.classList.remove("visible");
        hintBox.innerText = "";
      }

      function toggleHint() {
        const hintBox = document.getElementById("hint-box");
        if (hintBox.classList.contains("visible")) {
          hintBox.classList.remove("visible");
        } else {
          hintBox.innerText = translations[currentIndex];
          hintBox.classList.add("visible");
        }
      }

      function compareStrings(correct, user) {
        let html = "";
        const correctWords = correct.split(" ");
        const userWords = user.split(" ");
        const maxLength = Math.max(correctWords.length, userWords.length);
        for (let i = 0; i < maxLength; i++) {
          const cWord = correctWords[i] || "";
          const uWord = userWords[i] || "";
          const cleanC = cWord.toLowerCase().replace(/[.,?!]/g, "");
          const cleanU = uWord.toLowerCase().replace(/[.,?!]/g, "");
          if (cleanC === cleanU) {
            html += `<span class="diff-correct">${cWord}</span> `;
          } else {
            if (cWord) html += `<span class="diff-added">${cWord}</span> `;
            if (uWord) html += `<span class="diff-missing">${uWord}</span> `;
          }
        }
        return html;
      }

      updateUI();
    </script>
    <script src="/assets/js/exercise-feedback.js"></script>
    <script type="module" src="../../../../assets/js/nav-utensils.js"></script>
  </body>
</html>
