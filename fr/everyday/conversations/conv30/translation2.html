    <script>
      const questions = [
        {
          english:
            "Well, the reason I'm telling you all this is that this mail-forwarding service in the United States you're talking about makes me uneasy.",
          answers: [
            "Bon, si je te raconte tout ça, c'est parce que ce service de domiciliation aux États-Unis dont tu parles, ça me met pas à l'aise",
            "Bon, si je te raconte tout ça, c'est parce que ce service de domiciliation aux États-Unis dont tu parles, ça ne me met pas à l'aise",
          ],
        },
        {
          english: "Then one day, he sends a large sum.",
          answers: [
            "Et puis un jour, il envoie une grosse somme",
            "Et puis un jour, il envoie une grosse somme",
            "Et un jour, il envoie une grosse somme",
          ],
        },
        {
          english: "I trust them.",
          answers: ["Eux, j'ai confiance", "Eux, je leur fais confiance"],
        },
        {
          english: "That was more than ten years ago.",
          answers: ["Ça remonte à plus de dix ans"],
        },
        {
          english:
            "What Burmese people do in a country where the law can't protect them is post their story on Facebook.",
          answers: [
            "Ce que font les Birmans dans un pays où la loi peut pas les protéger, c'est qu'ils balancent leur histoire sur Facebook",
            "Ce que font les Birmans dans un pays où la loi ne peut pas les protéger, c'est qu'ils balancent leur histoire sur Facebook",
          ],
        },
        {
          english: "I understand what you mean.",
          answers: ["Je comprends ce que tu veux dire"],
        },
        { english: "Not a single hitch.", answers: ["Pas un seul pépin"] },
        {
          english: "There might be mail from our banks or investments.",
          answers: [
            "Y aura peut-être du courrier de nos banques ou de nos placements",
            "Il y aura peut-être du courrier de nos banques ou de nos placements",
          ],
        },
        {
          english: "No records, no signatures.",
          answers: ["Pas de traces, pas de signatures"],
        },
        {
          english:
            "Do you remember the doctor in the United States who sent 100,000 dollars to his usual hundi intermediary?",
          answers: [
            "Tu te souviens du médecin aux États-Unis qui avait envoyé 100 000 dollars à son intermédiaire hundi habituel",
            "Tu te rappelles le médecin aux États-Unis qui avait envoyé 100 000 dollars à son intermédiaire hundi habituel",
          ],
        },
      ];
    </script>
