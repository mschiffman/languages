    <script>
      const questions = [
        {
          english: "Why don't we ask Larry and Carol?",
          answers: [
            "Pourquoi on demanderait pas à Larry et Carol",
            "Pourquoi on ne demanderait pas à Larry et Carol",

        },

          answers: ["C'est une sacrée somme, quand même"],

        },
        {
          english: "We'll think about it.",
          answers: ["On va y réfléchir", "On va y penser"],
        },
        {
          english: "The guy disappeared.",
          answers: ["Le type a disparu", "Le mec a disparu"],
        },
        {
          english:
            "I was just thinking about the most practical way to keep our American driver's licenses.",
          answers: [
            "Moi, je pensais juste au moyen le plus pratique de garder nos permis de conduire américains",

        { english: "Same story.", answers: ["Même histoire"] },
