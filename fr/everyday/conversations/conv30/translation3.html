    <script>
      const questions = [
        {
          english: "She took off with the money.",
          answers: [
            "Elle s'est tirée avec le fric",
            "Elle s'est barrée avec le fric",
            "Elle s'est cassée avec le fric",
          ],
        },
        {
          english: "Well, this arrangement makes me suspicious.",
          answers: [
            "Ben, moi, cet arrangement me rend méfiante",
            "Bah, moi, cet arrangement me rend méfiante",
          ],
        },
        {
          english: "Back then, there was no Facebook in Myanmar.",
          answers: [
            "À l'époque, y avait pas Facebook au Myanmar",
            "À l'époque, il n'y avait pas Facebook au Myanmar",
          ],
        },
        { english: "That's true.", answers: ["C'est vrai"] },
        { english: "I guess so, yeah.", answers: ["J'imagine, ouais"] },
        {
          english: "They're going to open all our mail.",
          answers: ["Ils vont ouvrir tout notre courrier"],
        },
        {
          english: "This kind of service relies on trust.",
          answers: [
            "Ce service repose sur la confiance",
            "Ce genre de service repose sur la confiance",
          ],
        },
        {
          english: "Convenience isn't worth the risk.",
          answers: [
            "La commodité vaut pas le risque",
            "La commodité ne vaut pas le risque",
          ],
        },
        {
          english: "Wow, that's brutal.",
          answers: ["Waouh, c'est brutal", "Ouah, c'est brutal"],
        },
        {
          english: "So he couldn't do anything.",
          answers: [
            "Du coup, il pouvait rien faire",
            "Du coup, il ne pouvait rien faire",
          ],
        },
      ];
    </script>
