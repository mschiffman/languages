<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Dictation - 10 Levels</title>
    <script

      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"

      gtag("js", new Date());
      gtag("config", "G-CHXHM9CZKM");

    <link href="/img/favicon.png" rel="icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link

    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
      }
      .dictation-card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        width: 100%;
      }
      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 10px;
      }
      .level-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        background: #f8f9fa;
        padding: 10px;
        border-radius: 8px;
      }
      .level-btn {
        background: white;
        border: 1px solid #dcdcdc;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        color: #7f8c8d;
        transition: all 0.2s;
      }
      .level-btn:hover {
        background: #ecf0f1;
        color: #2c3e50;
      }
      .level-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .level-indicator {
        font-weight: bold;
        color: #3498db;
        text-transform: uppercase;
        font-size: 0.9rem;
      }
      .audio-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }
      .btn-audio {
        background: #e1f5fe;
        color: #0288d1;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-audio:hover {
        background: #b3e5fc;
        transform: scale(1.05);
      }
      .btn-slow {
        background: #fff3e0;
        color: #f57c00;
      }
      .btn-slow:hover {
        background: #ffe0b2;
      }
      .btn-hint {
        background: #f3e5f5;
        color: #8e24aa;
      }
      .btn-hint:hover {
        background: #e1bee7;
      }
      #player {
        display: none;
      }
      .hint-box {
        display: none;
        margin: -10px 0 20px;
        padding: 12px 15px;
        border-radius: 8px;
        background: #f3e5f5;
        color: #6a1b9a;
        font-style: italic;
        text-align: center;
      }
      .hint-box.visible {
        display: block;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1.1rem;
        font-family: "Segoe UI", sans-serif;
        resize: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }
      textarea:focus {
        outline: none;
        border-color: #3498db;
      }
      .feedback-area {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background: #fafafa;
        border: 1px dashed #ccc;
        min-height: 40px;
        font-size: 1.1rem;
        line-height: 1.6;
      }
      .diff-correct {
        color: #27ae60;
        font-weight: bold;
      }
      .diff-missing {
        color: #c0392b;
        text-decoration: line-through;
        opacity: 0.6;
        margin-right: 5px;
      }
      .diff-added {
        color: #2980b9;
        text-decoration: underline;
        font-weight: bold;
      }
      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }
      button.action-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-check {
        background: #2ecc71;
        color: white;
      }
      .btn-check:hover {
        background: #27ae60;
      }
      .btn-reveal {
        background: #f39c12;
        color: white;
      }
      .btn-reset {
        background: #95a5a6;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="dictation-card">
      <h2>🎧 Listening Lab</h2>
      <div class="level-bar">
        <button class="level-btn" id="prev-btn" onclick="changeLevel(-1)">
          ◀ Prev
        </button>
        <span class="level-indicator" id="level-display">Level 1 / 10</span>
        <button class="level-btn" id="next-btn" onclick="changeLevel(1)">
          Next ▶
        </button>
      </div>
      <div class="audio-controls">
        <button class="btn-audio" onclick="playAudio('m')">
          <span>👨</span> Male
        </button>
        <button class="btn-audio btn-slow" onclick="playAudio('f')">
          <span>👩</span> Female
        </button>
        <button class="btn-audio btn-hint" onclick="toggleHint()">
          <span>💡</span> Hint
        </button>
      </div>
      <audio id="player"></audio>
      <div class="hint-box" id="hint-box"></div>
      <textarea id="user-input" placeholder="Type what you hear..."></textarea>
      <div id="feedback" class="feedback-area">
        <span style="color: #aaa; font-style: italic"
          >Feedback will appear here...</span
        >
      </div>
      <div class="controls">
        <button class="action-btn btn-check" onclick="checkDictation()">
          Check
        </button>
        <button class="action-btn btn-reset" onclick="resetDictation()">
          Reset
        </button>
        <button class="action-btn btn-reveal" onclick="revealAnswer()">
          Reveal
        </button>
      </div>
    </div>

    <script>
      const sentences = [
        "tout le monde est passé à la voiture, et les marchés flottants ont quasiment disparu.",
        "Et puis notre guide nous a expliqué d'où ça venait,",
        "Les canaux, c'était les routes, quoi.",
        "Pendant des siècles, tout passait par l'eau.",
        "Pourquoi ?",
        "On est allées à Damnoen Saduak, celui qu'on voit sur toutes les photos.",
        "Ah bon ?",
        "Le premier, c'est pour les photos,",
        "Ouais... alors là, franchement, j'ai été un peu déçue.",
        "Mais c'est mis en scène à partir de quelque chose de vrai,",
        "Et surtout, on en a fait un autre deux jours après, beaucoup plus petit.",
        "Plus vraiment, non.",
        "Et puis au vingtième siècle, ils ont construit des routes,",
        "Et les marchés flottants, alors ?",
        "mais tout le monde est là pour la photo, quoi.",
        "C'est noté.",
        "Ben en fait, ces marchés-là, au départ, c'était pas du folklore.",
        "On s'est levées à cinq heures pour être là tôt,",
        "Ah, tu vois !",
        "et ils allaient d'un village à l'autre.",
        "Ça, c'était magnifique.",
        "Je suis encore complètement décalée,",
        "Ouais.",
        "T'y es allée ?",
        "c'est pas sorti de nulle part.",
        "et en fait... c'est un décor.",
        "commence par le petit.",
        "T'es assise dans ta barque,",
        "Si tu y vas un jour, fais l'inverse de nous :",
        "et les vendeuses, elles te vendent des aimants pour le frigo et des chapeaux.",
        "T'es rentrée quand ?",
        "Il fallait juste aller au bon endroit.",
        "C'est ce que je me suis dit sur le moment.",
        "le deuxième, c'est pour de vrai.",
        "on te promène, et on te vend des trucs.",
        "Exactement.",
        "C'était juste la vie normale.",
        "Enfin si, y a des fruits, y a de la nourriture,",
        "Là, c'est le soir, y a des Thaïlandais qui viennent manger,",
        "Et Bangkok, à l'époque, c'était sillonné de canaux.",
        "On l'appelait la Venise de l'Orient, il paraît.",
        "Donc oui, c'est mis en scène.",
        "Je t'appelle avant de réserver, hein.",
        "C'est-à-dire ?",
        "Dit comme ça, c'est un peu triste.",
        "Donc c'est pas un vrai marché.",
        "Y a que des touristes dans les barques,",
        "et j'ai vu les choses autrement.",
        "Dans les années soixante-dix, l'office du tourisme en a relancé quelques-uns.",
        "Et ils les ont fait revivre pour les touristes, du coup.",
        "C'est déjà mieux que rien.",
        "Voilà.",
        "on s'assoit au bord de l'eau avec une assiette de gambas grillées...",
        "Ah.",
        "Alors, ce voyage ?",
        "Ah, donc un marché de village, mais sur l'eau.",
        "Amphawa.",
        "Mardi.",
        "Les gens chargeaient leur barque de fruits, de légumes, d'artisanat,",
        "Mmh.",
        "je me réveille à quatre heures du matin.",
      ];

      const translations = [
        "everyone switched to cars, and the floating markets almost disappeared.",
        "Then our guide explained where it all came from,",
        "The canals were the roads.",
        "For centuries, everything moved by water.",
        "Why?",
        "We went to Damnoen Saduak, the one you see in all the photos.",
        "Really?",
        "The first one is for the photos,",
        "Yeah... honestly, I was a little disappointed.",
        "But it's staged out of something real,",
        "And more to the point, we did another one two days later, much smaller.",
        "Not really anymore, no.",
        "Then in the twentieth century they built roads,",
        "And the floating markets?",
        "but everyone's there for the picture.",
        "Noted.",
        "Well, these markets weren't folklore to begin with.",
        "We got up at five to be there early,",
        "Ah, see!",
        "and went from one village to the next.",
        "That was beautiful.",
        "I'm still completely jet-lagged,",
        "Yeah.",
        "Did you go?",
        "it didn't come from nowhere.",
        "and it turns out... it's a set.",
        "start with the small one.",
        "You're sitting in your boat,",
        "If you ever go, do the opposite of us:",
        "and the vendors are selling you fridge magnets and hats.",
        "When did you get back?",
        "You just had to go to the right place.",
        "That's what I thought at the time.",
        "the second one is for real.",
        "they row you around, and they sell you things.",
        "Exactly.",
        "They were just ordinary life.",
        "I mean, yes, there's fruit, there's food,",
        "That one's in the evening, Thai people come to eat,",
        "And Bangkok back then was crisscrossed with canals.",
        "They used to call it the Venice of the East, apparently.",
        "So yes, it's staged.",
        "I'm calling you before I book anything.",
        "Meaning?",
        "Put that way, it's kind of sad.",
        "So it's not a real market.",
        "There's nothing but tourists in the boats,",
        "and I saw it differently.",
        "In the seventies, the tourism board revived a few of them.",
        "And they brought them back for the tourists, then.",
        "That's better than nothing.",
        "Right.",
        "you sit down by the water with a plate of grilled prawns...",
        "Huh.",
        "So, the trip?",
        "Ah, so a village market, but on the water.",
        "Amphawa.",
        "Tuesday.",
        "People loaded their boats with fruit, vegetables, handicrafts,",
        "Hmm.",
        "I wake up at four in the morning.",
      ];

      let currentIndex = 0;
      const audioBase =
        "https://languages.rmlives.com/lessons/everyday/conv39/listen/";

      function changeLevel(direction) {
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= sentences.length)
          currentIndex = sentences.length - 1;
        updateUI();
        resetDictation();
      }

      function updateUI() {
        document.getElementById("level-display").innerText =
          `Level ${currentIndex + 1} / ${sentences.length}`;
        document.getElementById("prev-btn").disabled = currentIndex === 0;
        document.getElementById("next-btn").disabled =
          currentIndex === sentences.length - 1;
      }

      function playAudio(gender) {
        const num = String(currentIndex + 1).padStart(2, "0");
        const player = document.getElementById("player");
        player.src = `${audioBase}${num}-${gender}.mp3`;
        player.play();
      }

      function checkDictation() {
        const userText = document.getElementById("user-input").value.trim();
        const feedbackDiv = document.getElementById("feedback");
        if (!userText) {
          feedbackDiv.innerHTML =
            '<span style="color:#e74c3c">Please type something first!</span>';
          return;
        }
        feedbackDiv.innerHTML = compareStrings(
          sentences[currentIndex],
          userText,
        );
      }

      function revealAnswer() {
        document.getElementById("user-input").value = sentences[currentIndex];
        checkDictation();
      }

      function resetDictation() {
        document.getElementById("user-input").value = "";
        document.getElementById("feedback").innerHTML =
          '<span style="color:#aaa; font-style:italic;">Feedback will appear here...</span>';
        const hintBox = document.getElementById("hint-box");
        hintBox.classList.remove("visible");
        hintBox.innerText = "";
      }

      function toggleHint() {
        const hintBox = document.getElementById("hint-box");
        if (hintBox.classList.contains("visible")) {
          hintBox.classList.remove("visible");
        } else {
          hintBox.innerText = translations[currentIndex];
          hintBox.classList.add("visible");
        }
      }

      function compareStrings(correct, user) {
        let html = "";
        const correctWords = correct.split(" ");
        const userWords = user.split(" ");
        const maxLength = Math.max(correctWords.length, userWords.length);
        for (let i = 0; i < maxLength; i++) {
          const cWord = correctWords[i] || "";
          const uWord = userWords[i] || "";
          const cleanC = cWord.toLowerCase().replace(/[.,?!]/g, "");
          const cleanU = uWord.toLowerCase().replace(/[.,?!]/g, "");
          if (cleanC === cleanU) {
            html += `<span class="diff-correct">${cWord}</span> `;
          } else {
            if (cWord) html += `<span class="diff-added">${cWord}</span> `;
            if (uWord) html += `<span class="diff-missing">${uWord}</span> `;
          }
        }
        return html;
      }

      updateUI();
    </script>
    <script src="/assets/js/exercise-feedback.js"></script>
    <script type="module" src="../../../../assets/js/nav-utensils.js"></script>
  </body>
</html>
