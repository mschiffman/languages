    <script>
      const questions = [
        {
          english: "Then in the twentieth century they built roads,",
          answers: ["Et puis au vingtième siècle, ils ont construit des routes"],
        },
        {
          english: "They were just ordinary life.",
          answers: ["C'était juste la vie normale"],
        },
        {
          english: "There's nothing but tourists in the boats,",
          answers: ["Y a que des touristes dans les barques"],
          note: "y a que = colloquial for il n'y a que (\"there's only/nothing but\")",
        },
        {
          english:
            "We went to Damnoen Saduak, the one you see in all the photos.",
          answers: [
            "On est allées à Damnoen Saduak, celui qu'on voit sur toutes les photos",
          ],
        },
        {
          english: "it didn't come from nowhere.",
          answers: ["c'est pas sorti de nulle part"],
        },
        {
          english: "So yes, it's staged.",
          answers: ["Donc oui, c'est mis en scène"],
        },
        {
          english: "Exactly.",
          answers: ["Exactement"],
        },
        {
          english: "The first one is for the photos,",
          answers: ["Le premier, c'est pour les photos"],
        },
        {
          english: "If you ever go, do the opposite of us — start with the small one.",
          answers: [
            "Si tu y vas un jour, fais l'inverse de nous : commence par le petit",
          ],
          note: "The French colon introduces the restatement where English uses a dash",
        },
        {
          english: "People loaded their boats with fruit, vegetables, handicrafts,",
          answers: ["Les gens chargeaient leur barque de fruits, de légumes, d'artisanat"],
