    <script>
      const questions = [
        {
          english: "Really?",
          answers: ["Ah bon"],
        },
        {
          english:
            "And more to the point, we did another one two days later, much smaller.",
          answers: [
            "Et surtout, on en a fait un autre deux jours après, beaucoup plus petit",
          ],
        },
        {
          english: "Why?",
          answers: ["Pourquoi"],
        },
        {
          english: "Yeah.",
          answers: ["Ouais"],
        },
        {
          english:
            "That one's in the evening, Thai people come to eat, you sit down by the water with a plate of grilled prawns...",
          answers: [
            "Là, c'est le soir, y a des Thaïlandais qui viennent manger, on s'assoit au bord de l'eau avec une assiette de gambas grillées...",
          ],
          note: "y a = colloquial for il y a, dropping the impersonal il",
        },
        {
          english: "Amphawa.",
          answers: ["Amphawa"],
        },
        {
          english: "but everyone's there for the picture.",
          answers: ["mais tout le monde est là pour la photo, quoi"],
        },
        {
          english: "I'm calling you before I book anything.",
          answers: ["Je t'appelle avant de réserver, hein"],
        },
        {
          english: "We got up at five to be there early,",
          answers: ["On s'est levées à cinq heures pour être là tôt"],
        },
        {
          english: "Tuesday.",
          answers: ["Mardi"],
        },
      ];
    </script>
