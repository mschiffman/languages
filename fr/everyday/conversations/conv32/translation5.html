    <script>
      const questions = [
        {
          english: "I pulled all the spurge out from between the pavers.",
          answers: [
            "J'ai arraché toute l'euphorbe des dalles",
            "J'ai arraché toute l'euphorbe entre les dalles",
            "J'ai arraché toute l'euphorbe d'entre les dalles",
          ],
        },
        {
          english: "Yes, we're almost out.",
          answers: ["Oui, on n'en a presque plus", "Oui, on en a presque plus"],
        },
        {
          english: "Just wait, you'll see.",
          answers: ["Attends un peu, tu vas voir", "Attends un peu, tu verras"],
        },
        {
          english: "What are you making to eat tonight?",
          answers: [
            "Tu fais quoi à manger, ce soir",
            "Tu fais quoi à manger ce soir",
            "Qu'est-ce que tu fais à manger ce soir",
          ],
        },
        {
          english: "Is it going to rain tonight?",
          answers: [
            "Il va pleuvoir, ce soir",
            "Il va pleuvoir ce soir",
            "Est-ce qu'il va pleuvoir ce soir",
          ],
        },
        { english: "Yes, there's one left.", answers: ["Oui, il en reste un"] },
        {
          english: "...with tweezers. (idiom)",
          answers: ["à la pince à épiler"],
        },
        {
          english: "I've been good.",
          answers: ["J'ai été sage, moi", "J'ai été sage"],
        },
        {
          english: "Oh, great.",
          answers: ["Ah, chouette", "Ah, super", "Ah, génial"],
        },
        { english: "That's true.", answers: ["C'est vrai"] },
      ];
