    <script>
      const questions = [
        {
          english: "They predicted around 31, but we went past 33.",
          answers: [
            "On annonçait dans les 31, mais on a dépassé les 33",
            "Ils annonçaient dans les 31, mais on a dépassé les 33",
          ],
        },
        {
          english: "I can't wait to see what you're going to cook up for us.",
          answers: [
            "J'ai hâte de voir ce que tu vas nous mijoter",
            "J'ai hâte de voir ce que tu vas nous préparer",
          ],
        },
        {
          english: "Help me load it.",
          answers: ["Aide-moi à charger", "Aide-moi à le charger"],
        },
        {
          english: "Me, I love Indian food.",
          answers: [
            "Moi, j'adore la cuisine indienne",
            "Moi, j'adore la nourriture indienne",
          ],
        },
        {
          english: "I told you, salmon.",
          answers: ["Je te l'ai dit, du saumon"],
        },
        {
          english: "I might just surprise you, you know.",
          answers: [
            "Je pourrais bien te surprendre, tu sais",
            "Ha, je pourrais bien te surprendre, tu sais",
          ],
        },
        { english: "Not that I know of.", answers: ["Pas que je sache"] },
        {
          english: "They totally ignore me,",
          answers: [
            "Ils se fichent complètement de moi",
            "Ils se fichent complètement de moi",
            "Ils m'ignorent complètement",
          ],
        },
        {
          english: "You've been saying that for five years.",
          answers: [
            "Ça fait cinq ans que tu dis ça",
            "Ça fait cinq ans que tu dis ça",
          ],
        },
        {
          english: "I was sorting through the books before the move,",
          answers: [
            "Je faisais le tri dans les bouquins avant le déménagement",
            "Je faisais le tri dans les livres avant le déménagement",
          ],
        },
      ];
    </script>
