    <script>
      const questions = [
        {
          english: "Do we still have some in the fridge?",
          answers: [
            "On en a encore dans le frigo",
            "On en a encore dans le frigo ?",
            "Est-ce qu'on en a encore dans le frigo",
          ],
        },
        {
          english: "A cookbook with 660 curry recipes!",
          answers: [
            "Un bouquin de recettes à 660 currys",
            "Un livre de recettes à 660 currys",
            "Un bouquin de 660 recettes de curry",
          ],
        },
        {
          english: "Carrying heavy things, now",
          answers: [
            "Porter des trucs lourds, maintenant",
            "Porter des choses lourdes, maintenant",
          ],
        },
        {
          english: "It strains my neck.",
          answers: ["Ça me tire sur la nuque"],
        },
        {
          english: "Honestly, what a plant.",
          answers: ["Franchement, quelle plante"],
        },
        { english: "Please don't.", answers: ["Surtout pas"] },
        { english: "Tell me about it. (idiom)", answers: ["À qui le dis-tu"] },
        {
          english: "We're going to Costco tomorrow.",
          answers: [
            "On va à Costco demain",
            "On va à Costco demain",
            "Demain, on va à Costco",
          ],
        },
        {
          english: "By the way",
          answers: ["Au fait,"],
        },
        {
          english: "Did you see the lantana is covered in flowers again?",
          answers: [
            "T'as vu que le lantana est de nouveau couvert de fleurs",
            "Tu as vu que le lantana est de nouveau couvert de fleurs",
            "T'as vu que le lantana est à nouveau couvert de fleurs",
            "Tu as vu que le lantana est à nouveau couvert de fleurs",
          ],
        },
        {
          english: "I don't know what purpose it serves in nature,",
          answers: [
            "Je sais pas à quoi ça sert dans la nature",
            "Je ne sais pas à quoi ça sert dans la nature",
          ],
        },
        { english: "Who knows!", answers: ["Va savoir"] },
      ];
    </script>
