    <script>
      const questions = [
        {
          english: "Apparently salmon is the healthiest fish.",
          answers: [
            "Il paraît que le saumon, c'est le poisson le plus sain",
            "Apparemment, le saumon, c'est le poisson le plus sain",
          ],
        },
        {
          english: "...and I came across it.",
          answers: ["Je suis tombé dessus", "et je suis tombé dessus"],
        },
        {
          english: "...even when I'm watering it.",
          answers: ["Même quand je l'arrose"],
        },
        {
          english: "It makes me dizzy.",
          answers: ["Ça me donne des vertiges", "Ça me donne le vertige"],
        },
        {
          english: "Well now, you've got an ambitious project on your desk.",
          answers: [
            "Dis donc, t'as un projet ambitieux sur le bureau",
            "Dis donc, tu as un projet ambitieux sur le bureau",
          ],
        },
        {
          english: "We need to stop by H Mart to buy more.",
          answers: [
            "Faut qu'on passe à H Mart en racheter",
            "Il faut qu'on passe à H Mart en racheter",
            "Faut qu'on passe à H Mart pour en racheter",
            "Il faut qu'on passe à H Mart pour en racheter",
          ],
        },
        {
          english: "The last rain flattened the flowers.",
          answers: ["La dernière pluie a couché les fleurs"],
        },
        {
          english: "I was sweating like an ox this morning.",
          answers: [
            "Je suais comme un bœuf, ce matin",
            "Je suais comme un bœuf ce matin",
          ],
        },
        {
          english: "Don't inflict your cooking on me, have mercy.",
          answers: [
            "M'inflige pas ta cuisine, pitié",
            "Ne m'inflige pas ta cuisine, pitié",
            "M'inflige pas ta cuisine, par pitié",
            "Ne m'inflige pas ta cuisine, par pitié",
          ],
        },
        {
          english: "We should eat it more often.",
          answers: ["On devrait en manger plus souvent"],
        },
      ];
    </script>
