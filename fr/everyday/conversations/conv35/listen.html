<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Dictation - 10 Levels</title>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-CHXHM9CZKM");
    </script>
    <link href="/img/favicon.png" rel="icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
      }
      .dictation-card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        width: 100%;
      }
      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 10px;
      }
      .level-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        background: #f8f9fa;
        padding: 10px;
        border-radius: 8px;
      }
      .level-btn {
        background: white;
        border: 1px solid #dcdcdc;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        color: #7f8c8d;
        transition: all 0.2s;
      }
      .level-btn:hover {
        background: #ecf0f1;
        color: #2c3e50;
      }
      .level-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .level-indicator {
        font-weight: bold;
        color: #3498db;
        text-transform: uppercase;
        font-size: 0.9rem;
      }
      .audio-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }
      .btn-audio {
        background: #e1f5fe;
        color: #0288d1;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-audio:hover {
        background: #b3e5fc;
        transform: scale(1.05);
      }
      .btn-slow {
        background: #fff3e0;
        color: #f57c00;
      }
      .btn-slow:hover {
        background: #ffe0b2;
      }
      .btn-hint {
        background: #f3e5f5;
        color: #8e24aa;
      }
      .btn-hint:hover {
        background: #e1bee7;
      }
      #player {
        display: none;
      }
      .hint-box {
        display: none;
        margin: -10px 0 20px;
        padding: 12px 15px;
        border-radius: 8px;
        background: #f3e5f5;
        color: #6a1b9a;
        font-style: italic;
        text-align: center;
      }
      .hint-box.visible {
        display: block;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1.1rem;
        font-family: "Segoe UI", sans-serif;
        resize: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }
      textarea:focus {
        outline: none;
        border-color: #3498db;
      }
      .feedback-area {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background: #fafafa;
        border: 1px dashed #ccc;
        min-height: 40px;
        font-size: 1.1rem;
        line-height: 1.6;
      }
      .diff-correct {
        color: #27ae60;
        font-weight: bold;
      }
      .diff-missing {
        color: #c0392b;
        text-decoration: line-through;
        opacity: 0.6;
        margin-right: 5px;
      }
      .diff-added {
        color: #2980b9;
        text-decoration: underline;
        font-weight: bold;
      }
      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }
      button.action-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-check {
        background: #2ecc71;
        color: white;
      }
      .btn-check:hover {
        background: #27ae60;
      }
      .btn-reveal {
        background: #f39c12;
        color: white;
      }
      .btn-reset {
        background: #95a5a6;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="dictation-card">
      <h2>🎧 Listening Lab</h2>
      <div class="level-bar">
        <button class="level-btn" id="prev-btn" onclick="changeLevel(-1)">
          ◀ Prev
        </button>
        <span class="level-indicator" id="level-display">Level 1 / 10</span>
        <button class="level-btn" id="next-btn" onclick="changeLevel(1)">
          Next ▶
        </button>
      </div>
      <div class="audio-controls">
        <button class="btn-audio" onclick="playAudio('m')">
          <span>👨</span> Male
        </button>
        <button class="btn-audio btn-slow" onclick="playAudio('f')">
          <span>👩</span> Female
        </button>
        <button class="btn-audio btn-hint" onclick="toggleHint()">
          <span>💡</span> Hint
        </button>
      </div>
      <audio id="player"></audio>
      <div class="hint-box" id="hint-box"></div>
      <textarea id="user-input" placeholder="Type what you hear..."></textarea>
      <div id="feedback" class="feedback-area">
        <span style="color: #aaa; font-style: italic"
          >Feedback will appear here...</span
        >
      </div>
      <div class="controls">
        <button class="action-btn btn-check" onclick="checkDictation()">
          Check
        </button>
        <button class="action-btn btn-reset" onclick="resetDictation()">
          Reset
        </button>
        <button class="action-btn btn-reveal" onclick="revealAnswer()">
          Reveal
        </button>
      </div>
    </div>

    <script>
      const sentences = [
        "Il va faire très chaud aujourd'hui.",
        "Je gère.",
        "La cuisine d'Alila2, elle est plus grande que celle d'Andaman@Quayside.",
        "On coupe les légumes.",
        "Toujours arrangeante.",
        "Faut que je traite demain.",
        "Plein de vaisselle à faire.",
        "Passe-moi l'oignon et les poivrons.",
        "Laisse-la refroidir d'abord.",
        "C'est vrai.",
        "Si t'es calée à ce point, tu peux peut-être zapper la dégustation cette fois.",
        "Ça devrait suffire.",
        "Tout est fait.",
        "Faut que tu te ménages.",
        "Oups, faut que je ressorte arroser les plantes.",
        "Vu qu'ils sont souvent partis, leur jardin est plutôt beau.",
        "Combien de gousses ?",
        "Ça doit être sympa de pouvoir partir comme ça n'importe quand dans l'année, quel que soit le temps.",
        "C'est un combat sans fin.",
        "Et t'en auras encore plein, de l'amour.",
        "Je suis ce genre de femme.",
        "Leur jardinier leur a installé tout un système de goutte-à-goutte pour les plantes.",
        "OK.",
        "On cuisinera à 15 h.",
        "J'ai trop hâte de plus avoir à jardiner à Penang.",
        "C'est fait.",
        "Bien sûr.",
        "Nous, on peut pas.",
        "Ils annoncent dans les 38 degrés.",
        "Va t'asseoir.",
        "Quoi d'autre ?",
        "On a encore du chiendent qui envahit tout depuis le terrain de golf.",
        "Je vais faire de la place.",
        "Voilà la planche et le couteau.",
        "Il a fait du bon boulot.",
        "Vas-y, envoie !",
        "Fini les plantes.",
        "Après j'essuierai la graisse et je la jetterai à la poubelle.",
        "J'ai mal au pied.",
        "Tu veux pas éplucher et hacher l'ail ?",
        "Ouah, tu m'aimes beaucoup aujourd'hui.",
        "C'est bon.",
        "Là, faut que je m'assoie.",
        "Tiens, voilà l'ail.",
        "Le lantana surtout, c'est un vrai gouffre à eau.",
        "Ben, on pourra le faire à Penang.",
        "OK.",
        "T'as besoin que je fasse quelque chose là, tout de suite ?",
        "Pas aussi grande qu'ici, mais y a assez de place.",
        "Tiens, la poêle à laver.",
        "Remarque, je suis encore bien calée du petit-déj.",
        "La pelouse d'Elka, elle en a bien plus, du chiendent.",
        "Ah, pense à me faire goûter quand les boulettes seront prêtes.",
        "Ils feraient bien de traiter aussi.",
      ];

      const translations = [
        "It's going to be very hot today.",
        "I've got this.",
        "The kitchen at Alila2 is bigger than the one at Andaman@Quayside.",
        "We'll cut the vegetables.",
        "Always accommodating.",
        "I need to treat it tomorrow.",
        "Lots of dishes to do.",
        "Pass me the onion and peppers.",
        "Let it cool down first.",
        "That's true.",
        "If you're that full, maybe you can skip the tasting this time.",
        "That should be enough.",
        "Everything's done.",
        "You need to take it easy.",
        "Oops, I need to go back outside to water the plants.",
        "Considering they're often away, their garden is pretty nice.",
        "How many cloves?",
        "It must be nice to be able to leave like that anytime during the year, whatever the weather.",
        "It's a never-ending battle.",
        "And you'll get plenty more love.",
        "I'm that kind of woman.",
        "Their gardener installed a whole drip-irrigation system for their plants.",
        "Okay.",
        "We'll cook at 3 p.m.",
        "I can't wait to not have to garden anymore in Penang.",
        "Done.",
        "Of course.",
        "We can't.",
        "They're forecasting around 38 degrees.",
        "Go sit down.",
        "What else?",
        "We still have couch grass invading everything from the golf course.",
        "I'll make room.",
        "Here's the cutting board and knife.",
        "He did a good job.",
        "Go ahead, send it my way!",
        "No more plants.",
        "After that I'll wipe off the grease and throw it in the trash.",
        "My foot hurts.",
        "Would you peel and chop the garlic?",
        "Wow, you love me a lot today.",
        "It's fine.",
        "Right now I need to sit down.",
        "Here, here's the garlic.",
        "The lantana in particular is a real water guzzler.",
        "Well, we'll be able to do that in Penang.",
        "Okay.",
        "Do you need me to do anything right now?",
        "Not as big as here, but there's enough space.",
        "Here, the pan needs washing.",
        "Actually, I'm still pretty full from breakfast.",
        "Elka's lawn has way more couch grass.",
        "Oh, remember to let me taste some when the meatballs are ready.",
        "They would do well to treat it too.",
      ];

      const audioNums = [
        38, 5, 35, 25, 12, 43, 2, 27, 15, 48, 8, 22, 29, 34, 37, 47, 20, 51, 44,
        3, 11, 49, 17, 30, 41, 23, 13, 52, 39, 33, 24, 42, 10, 26, 50, 4, 54,
        16, 32, 19, 1, 9, 31, 21, 40, 53, 28, 18, 36, 14, 7, 45, 6, 46,
      ];

      let currentIndex = 0;
      const audioBase =
        "https://languages.rmlives.com/lessons/everyday/conv35/listen/";

      function changeLevel(direction) {
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= sentences.length)
          currentIndex = sentences.length - 1;
        updateUI();
        resetDictation();
      }

      function updateUI() {
        document.getElementById("level-display").innerText =
          `Level ${currentIndex + 1} / ${sentences.length}`;
        document.getElementById("prev-btn").disabled = currentIndex === 0;
        document.getElementById("next-btn").disabled =
          currentIndex === sentences.length - 1;
      }

      function playAudio(gender) {
        const num = String(audioNums[currentIndex]).padStart(2, "0");
        const player = document.getElementById("player");
        player.src = `${audioBase}${num}-${gender}.mp3`;
        player.play();
      }

      function checkDictation() {
        const userText = document.getElementById("user-input").value.trim();
        const feedbackDiv = document.getElementById("feedback");
        if (!userText) {
          feedbackDiv.innerHTML =
            '<span style="color:#e74c3c">Please type something first!</span>';
          return;
        }
        feedbackDiv.innerHTML = compareStrings(
          sentences[currentIndex],
          userText,
        );
      }

      function revealAnswer() {
        document.getElementById("user-input").value = sentences[currentIndex];
        checkDictation();
      }

      function resetDictation() {
        document.getElementById("user-input").value = "";
        document.getElementById("feedback").innerHTML =
          '<span style="color:#aaa; font-style:italic;">Feedback will appear here...</span>';
        const hintBox = document.getElementById("hint-box");
        hintBox.classList.remove("visible");
        hintBox.innerText = "";
      }

      function toggleHint() {
        const hintBox = document.getElementById("hint-box");
        if (hintBox.classList.contains("visible")) {
          hintBox.classList.remove("visible");
        } else {
          hintBox.innerText = translations[currentIndex];
          hintBox.classList.add("visible");
        }
      }

      function compareStrings(correct, user) {
        let html = "";
        const correctWords = correct.split(" ");
        const userWords = user.split(" ");
        const maxLength = Math.max(correctWords.length, userWords.length);
        for (let i = 0; i < maxLength; i++) {
          const cWord = correctWords[i] || "";
          const uWord = userWords[i] || "";
          const cleanC = cWord.toLowerCase().replace(/[.,?!]/g, "");
          const cleanU = uWord.toLowerCase().replace(/[.,?!]/g, "");
          if (cleanC === cleanU) {
            html += `<span class="diff-correct">${cWord}</span> `;
          } else {
            if (cWord) html += `<span class="diff-added">${cWord}</span> `;
            if (uWord) html += `<span class="diff-missing">${uWord}</span> `;
          }
        }
        return html;
      }

      updateUI();
    </script>
    <script src="exercise-feedback.js"></script>
    <script type="module" src="../../../../assets/js/nav-utensils.js"></script>
  </body>
</html>
