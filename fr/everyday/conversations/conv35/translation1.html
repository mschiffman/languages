    <script>
      const questions = [
        {
          english: "It's going to be very hot today.",
          answers: [
            "Il va faire très chaud aujourd'hui",
            "Il fera très chaud aujourd'hui",
            "Aujourd'hui il va faire très chaud",
            "Aujourd'hui il fera très chaud",

        { english: "I've got this.", answers: ["Je gère", "Je gère ça"] },
        {
          english:
            "The kitchen at Alila2 is bigger than the one at Andaman@Quayside.",
          answers: [
            "La cuisine d'Alila2, elle est plus grande que celle d'Andaman@Quayside",
            "La cuisine d'Alila2 est plus grande que celle d'Andaman@Quayside",

        },
        {
          english: "We'll cut the vegetables.",
          answers: [
            "On coupe les légumes",
            "On va couper les légumes",
            "Nous coupons les légumes",
            "Nous allons couper les légumes",
          ],
        },
        {
          english: "Always accommodating.",
          answers: [
            "Toujours arrangeante",
            "Toujours accommodante",
            "Toujours conciliante",
          ],
        },
        {
          english: "I need to treat it tomorrow.",
          answers: [
            "Faut que je traite demain",
            "Il faut que je traite demain",
            "Faut que je le traite demain",

            "Je dois traiter demain",
            "Je dois le traiter demain",
          ],
        },
        {
          english: "Lots of dishes to do.",

            "Plein de vaisselle à faire",
            "Beaucoup de vaisselle à faire",

        },
        {
          english: "Pass me the onion and peppers.",

            "Passe-moi l'oignon et les poivrons",
            "Passez-moi l'oignon et les poivrons",

        },
        {
          english: "Let it cool down first.",
          answers: [
            "Laisse-la refroidir d'abord",
            "Laisse-la d'abord refroidir",

            "Laissez-la d'abord refroidir",

        { english: "That's true.", answers: ["C'est vrai"] },
