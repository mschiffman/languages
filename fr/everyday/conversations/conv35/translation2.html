<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Translation Quiz</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-CHXHM9CZKM");
    </script>
    <link href="/img/favicon.png" rel="icon" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../../../../assets/css/translation.css" />
  </head>
  <body>
    <div class="translation-card">
      <h2>✍️ Translation Challenge (Page 2)</h2>
      <p class="subtitle">Translate the sentences into French. (Watch your spelling!)</p>
      <div id="quiz-area"></div>
      <div class="btn-row">
        <button class="btn-verify" onclick="checkTranslations()">Check Answers</button>
        <button class="btn-reset" onclick="resetTranslations()">Reset</button>
      </div>
      <div class="page-nav">
        <a href="translation1.html" class="page-btn">1</a>
        <a href="translation2.html" class="page-btn active">2</a>
        <a href="translation3.html" class="page-btn">3</a>
        <a href="translation4.html" class="page-btn">4</a>
        <a href="translation5.html" class="page-btn">5</a>
      </div>
    </div>
    <script>
      const questions = [
        { english: "That should be enough.", answers: ["Ça devrait suffire"] },
        { english: "Everything's done.", answers: ["Tout est fait"] },
        { english: "You need to take it easy.", answers: ["Faut que tu te ménages", "Il faut que tu te ménages"] },
        { english: "Oops, I need to go back outside to water the plants.", answers: ["Oups, faut que je ressorte arroser les plantes", "Oups, il faut que je ressorte arroser les plantes"] },
        { english: "Considering they're often away, their garden is pretty nice.", answers: ["Vu qu'ils sont souvent partis, leur jardin est plutôt beau"] },
        { english: "How many cloves?", answers: ["Combien de gousses"] },
        { english: "It must be nice to be able to leave like that anytime during the year, whatever the weather.", answers: ["Ça doit être sympa de pouvoir partir comme ça n'importe quand dans l'année, quel que soit le temps"] },
        { english: "It's a never-ending battle.", answers: ["C'est un combat sans fin"] },
        { english: "And you'll get plenty more love.", answers: ["Et t'en auras encore plein, de l'amour", "Et tu en auras encore plein, de l'amour"] },
        { english: "I'm that kind of woman.", answers: ["Je suis ce genre de femme"] },
        { english: "Their gardener installed a whole drip-irrigation system for their plants.", answers: ["Leur jardinier leur a installé tout un système de goutte-à-goutte pour les plantes"] },
      ];
    </script>
    <script>
      function renderQuiz(){document.getElementById("quiz-area").innerHTML=questions.map((q,i)=>`<div class="question-block" id="block-${i+1}"><span class="english-prompt">${i+1}. ${q.english}</span><div class="input-wrap"><input type="text" class="user-input" id="q${i+1}" placeholder="Type here..." /><i class="bi bi-check-circle-fill check-icon"></i></div><div class="feedback-msg" id="msg-${i+1}"></div></div>`).join("");}
      function normalizeAnswer(value){return value.trim().toLowerCase().replace(/[.?!]$/u,"");}
      function checkTranslations(){questions.forEach((question,index)=>{const blockEl=document.getElementById("block-"+(index+1));const msgEl=document.getElementById("msg-"+(index+1));const userVal=normalizeAnswer(document.getElementById("q"+(index+1)).value);const isCorrect=question.answers.some((answer)=>userVal===normalizeAnswer(answer));blockEl.classList.toggle("correct-block",isCorrect);blockEl.classList.toggle("wrong-block",!isCorrect);msgEl.style.display="block";msgEl.style.color=isCorrect?"#27ae60":"#c0392b";msgEl.innerText=isCorrect?"✅ Correct!":`❌ Correction: "${question.answers[0]}"`;});}
      function resetTranslations(){questions.forEach((_,index)=>{document.getElementById("q"+(index+1)).value="";document.getElementById("block-"+(index+1)).classList.remove("correct-block","wrong-block");document.getElementById("msg-"+(index+1)).style.display="none";});}
      renderQuiz();
    </script>
    <script type="module" src="../../../../assets/js/nav-utensils.js"></script>
  </body>
</html>
