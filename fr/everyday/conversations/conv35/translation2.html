      const questions = [
        {
          english: "That should be enough.",
          answers: ["Ça devrait suffire", "Ça devrait aller"],
        },
        {
          english: "Everything's done.",
          answers: ["Tout est fait", "Tout est terminé", "Tout est fini"],

        {

            "Oups, faut que je ressorte arroser les plantes",
            "Oups, il faut que je ressorte arroser les plantes",
            "Oups, faut que je ressorte pour arroser les plantes",

        {
          english:
            "Considering they're often away, their garden is pretty nice.",
          answers: [
            "Vu qu'ils sont souvent partis, leur jardin est plutôt beau",
            "Vu qu'ils sont souvent absents, leur jardin est plutôt beau",
            "Étant donné qu'ils sont souvent partis, leur jardin est plutôt beau",

        },
        {
          english: "How many cloves?",
          answers: ["Combien de gousses", "Combien de gousses d'ail"],

        {
          english: "It's a never-ending battle.",
          answers: ["C'est un combat sans fin", "C'est une bataille sans fin"],

        {

          answers: [
            "Et t'en auras encore plein, de l'amour",

          english: "I'm that kind of woman.",
