    <script>
      const questions = [
        {
          english: "Here's the cutting board and knife.",
          answers: [
            "Voilà la planche et le couteau",
            "Voici la planche et le couteau",
            "Voilà la planche à découper et le couteau",
          ],
        },
        {
          english: "He did a good job.",
          answers: [
            "Il a fait du bon boulot",
            "Il a fait du bon travail",
            "Il a fait du bon job",
          ],
        },
        {
          english: "Go ahead, send it my way!",
          answers: ["Vas-y, envoie", "Vas-y, balance"],
        },
        {
          english: "No more plants.",
          answers: [
            "Fini les plantes",
            "Fini, les plantes",
            "Terminé les plantes",
          ],
        },
        {
          english:
            "After that I'll wipe off the grease and throw it in the trash.",
          answers: [
            "Après j'essuierai la graisse et je la jetterai à la poubelle",
            "Après j'essuie la graisse et je la jette à la poubelle",
            "Ensuite j'essuierai la graisse et je la jetterai à la poubelle",
          ],
        },
        { english: "My foot hurts.", answers: ["J'ai mal au pied"] },
        {
          english: "Would you peel and chop the garlic?",
          answers: [
            "Tu veux pas éplucher et hacher l'ail",
            "Tu ne veux pas éplucher et hacher l'ail",
          ],
        },
        {
          english: "Wow, you love me a lot today.",
          answers: [
            "Ouah, tu m'aimes beaucoup aujourd'hui",
            "Waouh, tu m'aimes beaucoup aujourd'hui",
            "Ouah, tu m'aimes bien aujourd'hui",
          ],
        },
        { english: "It's fine.", answers: ["C'est bon", "C'est bon", "Ça va"] },
        {
          english: "Right now I need to sit down.",
          answers: [
            "Là, faut que je m'assoie",
            "Là, il faut que je m'assoie",
            "Là, faut que je m'asseye",
            "Là, il faut que je m'asseye",
          ],
        },
        {
          english: "Here, here's the garlic.",
          answers: ["Tiens, voilà l'ail", "Tiens, voici l'ail"],
        },
      ];
    </script>
