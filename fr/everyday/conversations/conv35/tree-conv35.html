<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mind Map - Conversation 35</title>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-CHXHM9CZKM");
    </script>

    <!-- Favicons -->
    <link href="/img/favicon.png" rel="icon" />

    <link rel="stylesheet" href="../../../../assets/css/tree.css" />
  </head>

  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.2.2/d3.min.js"></script>
    <script>
      var treeData = {
        name: "Conversation 35",
        children: [
          {
            name: "La vaisselle et les boulettes",
            style: { stroke: "#007850", fill: "#007850" },
            children: [
              { name: "Plein de vaisselle à faire - lots of dishes to do" },
              {
                name: "Tu m'aimes beaucoup aujourd'hui - you love me a lot today",
              },
              {
                name: "Et t'en auras encore plein, de l'amour - and you'll get plenty more love",
              },
              {
                name: "Vas-y, envoie ! Je gère - go ahead, send it my way, I've got this",
              },
              {
                name: "Pense à me faire goûter les boulettes - remember to let me taste the meatballs",
              },
              {
                name: "Je suis encore bien calée du petit-déj - I'm still pretty full from breakfast",
              },
              {
                name: "Tu peux zapper la dégustation cette fois - you can skip the tasting this time",
              },
              {
                name: "Je vais faire de la place, toujours arrangeante - I'll make room, always accommodating",
              },
            ],
          },
          {
            name: "La poêle à nettoyer",
            style: { stroke: "#8a6d00", fill: "#8a6d00" },
            children: [
              { name: "Tiens, la poêle à laver - here, the pan to wash" },
              { name: "Laisse-la refroidir d'abord - let it cool down first" },
              { name: "J'essuierai la graisse - I'll wipe off the grease" },
              {
                name: "Je la jetterai à la poubelle - I'll throw it in the trash",
              },
              {
                name: "T'as besoin que je fasse quelque chose ? - do you need me to do anything?",
              },
            ],
          },
          {
            name: "La préparation des légumes",
            style: { stroke: "#e07b39", fill: "#e07b39" },
            children: [
              {
                name: "Tu veux pas éplucher et hacher l'ail ? - would you peel and chop the garlic?",
              },
              { name: "Combien de gousses ? - how many cloves?" },
              {
                name: "Voilà l'ail, ça devrait suffire - here's the garlic, that should be enough",
              },
              { name: "Quoi d'autre ? - what else?" },
              { name: "On coupe les légumes - we'll cut the vegetables" },
              {
                name: "Voilà la planche et le couteau - here's the cutting board and knife",
              },
              {
                name: "Passe-moi l'oignon et les poivrons - pass me the onion and peppers",
              },
              { name: "On cuisinera à 15 h - we'll cook at 3 p.m." },
            ],
          },
          {
            name: "Le pied douloureux",
            style: { stroke: "#9e2a00", fill: "#9e2a00" },
            children: [
              { name: "Tout est fait - everything's done" },
              { name: "Faut que je m'assoie - I need to sit down" },
              { name: "J'ai mal au pied - my foot hurts" },
              { name: "Va t'asseoir - go sit down" },
              { name: "Faut que tu te ménages - you need to take it easy" },
            ],
          },
          {
            name: "Comparaison des cuisines",
            style: { stroke: "#0070a8", fill: "#0070a8" },
            children: [
              {
                name: "La cuisine d'Alila2 est plus grande que celle d'Andaman@Quayside - Alila2's kitchen is bigger than Andaman@Quayside's",
              },
              { name: "Pas aussi grande qu'ici - not as big as here" },
              { name: "Y a assez de place - there's enough space" },
            ],
          },
          {
            name: "Arroser les plantes",
            style: { stroke: "#7b02b5", fill: "#7b02b5" },
            children: [
              {
                name: "Faut que je ressorte arroser les plantes - I need to go back out and water the plants",
              },
              {
                name: "Il va faire très chaud aujourd'hui - it's going to be very hot today",
              },
              {
                name: "Ils annoncent dans les 38 degrés - they're forecasting around 100°F",
              },
              {
                name: "Le lantana, un vrai gouffre à eau - the lantana is a real water guzzler",
              },
            ],
          },
          {
            name: "La bataille du chiendent",
            style: { stroke: "#006666", fill: "#006666" },
            children: [
              {
                name: "Le chiendent envahit tout depuis le terrain de golf - bermuda grass creeps in from the golf course",
              },
              { name: "Faut que je traite demain - I need to spray tomorrow" },
              { name: "C'est un combat sans fin - it's a never-ending battle" },
              {
                name: "La pelouse d'Elka en a bien plus - Elka's lawn has way more of it",
              },
              {
                name: "Ils feraient bien de traiter aussi - they need to spray theirs too",
              },
            ],
          },
          {
            name: "Les voisins et leur jardinier",
            style: { stroke: "#a11d5c", fill: "#a11d5c" },
            children: [
              {
                name: "Vu qu'ils sont souvent partis - considering they're away a lot",
              },
              {
                name: "Leur jardin est plutôt beau - their yard looks pretty good",
              },
              {
                name: "Leur jardinier leur a installé un système de goutte-à-goutte - their gardener installed a drip-irrigation system",
              },
              { name: "Il a fait du bon boulot - he did a good job" },
            ],
          },
          {
            name: "La liberté de partir",
            style: { stroke: "#4b7f00", fill: "#4b7f00" },
            children: [
              {
                name: "Ça doit être sympa de partir n'importe quand dans l'année - it must be nice to leave anytime during the year",
              },
              { name: "Quel que soit le temps - whatever the weather" },
              { name: "Nous, on peut pas - we can't" },
              {
                name: "J'ai trop hâte de plus avoir à jardiner à Penang - I can't wait to not have to garden anymore in Penang",
              },
              {
                name: "On pourra le faire à Penang - we'll be able to do that in Penang",
              },
              { name: "Fini les plantes - no more plants" },
            ],
          },
        ],
      };

      var colors = {
        node: {
          rootFill: "#1d03e1ff",
          defaultFill: "rgb(39, 43, 77)",
          strokeHasChildren: "rgb(3, 192, 220)",
          strokeLeaf: "rgba(222, 38, 173, 1)",
        },
        text: {
          root: "rgba(255, 255, 255, 1)",
          hasChildren: "#ffffff",
          leaf: "rgba(255, 255, 255, 1)",
        },
        link: "#ccc",
      };

      var margin = { top: 20, right: 90, bottom: 30, left: 90 },
        width = 960 - margin.left - margin.right,
        height = 500 - margin.top - margin.bottom;

      document.addEventListener("DOMContentLoaded", function () {
        var svgSelection = d3
          .select("body")
          .append("svg")
          .attr("width", "100vw")
          .attr("height", "100vh");

        var svg = svgSelection
          .append("g")
          .attr(
            "transform",
            "translate(" + margin.left + "," + margin.top + ")",
          );

        var zoom = d3.zoom().on("zoom", function () {
          svg.attr("transform", d3.event.transform);
        });

        svgSelection
          .call(zoom)
          .call(
            zoom.transform,
            d3.zoomIdentity.translate(margin.left, margin.top),
          );

        var i = 0,
          duration = 750,
          root;
        var treemap = d3.tree().nodeSize([40, 180]);
        root = d3.hierarchy(treeData, function (d) {
          return d.children;
        });
        root.x0 = height / 2;
        root.y0 = 0;
        root.children.forEach(collapse);

        update(root);

        function collapse(d) {
          if (d.children) {
            d._children = d.children;
            d._children.forEach(collapse);
            d.children = null;
          }
        }

        function update(source) {
          var treeData = treemap(root);
          var nodes = treeData.descendants(),
            links = treeData.descendants().slice(1);
          nodes.forEach(function (d) {
            d.x = d.x + height / 2;
          });
          var node = svg.selectAll("g.node").data(nodes, function (d) {
            return d.id || (d.id = ++i);
          });
          var nodeEnter = node
            .enter()
            .append("g")
            .attr("class", "node")
            .attr("transform", function (d) {
              return "translate(" + source.y0 + "," + source.x0 + ")";
            })
            .on("click", click);
          nodeEnter
            .attr("class", "node")
            .attr("r", 1e-6)
            .style("fill", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.fill) return p.data.style.fill;
                p = p.parent;
              }
              return d.parent ? colors.node.defaultFill : colors.node.rootFill;
            });

          nodeEnter
            .append("text")
            .style("fill", function (d) {
              if (d.parent) {
                return d.children || d._children
                  ? colors.text.hasChildren
                  : colors.text.leaf;
              }
              return colors.text.root;
            })
            .attr("dy", ".35em")
            .attr("text-anchor", function (d) {
              return "middle";
            })
            .text(function (d) {
              return d.data.name;
            });

          nodeEnter.each(function (d) {
            var bbox = this.querySelector("text").getBBox();
            d.width = bbox.width + 20;
            d.height = bbox.height + 10;
          });

          var maxDepthWidth = [];
          nodes.forEach(function (d) {
            if (!maxDepthWidth[d.depth] || d.width > maxDepthWidth[d.depth]) {
              maxDepthWidth[d.depth] = d.width;
            }
          });
          var depthY = [0];
          for (var j = 1; j <= maxDepthWidth.length; j++) {
            depthY[j] = depthY[j - 1] + (maxDepthWidth[j - 1] || 0) + 80;
          }
          nodes.forEach(function (d) {
            d.y = depthY[d.depth];
          });

          nodeEnter
            .insert("rect", "text")
            .attr("rx", 6)
            .attr("ry", 6)
            .attr("stroke-width", function (d) {
              return d.parent ? 1 : 0;
            })
            .attr("stroke", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.stroke)
                  return p.data.style.stroke;
                p = p.parent;
              }
              return d.children || d._children
                ? colors.node.strokeHasChildren
                : colors.node.strokeLeaf;
            })
            .attr("stroke-dasharray", "0")
            .attr("stroke-opacity", function (d) {
              return d.children || d._children ? "1" : "0.6";
            })
            .attr("x", 0)
            .attr("y", function (d) {
              return -(d.height / 2);
            })
            .attr("width", function (d) {
              return d.width;
            })
            .attr("height", function (d) {
              return d.height;
            });

          nodeEnter.selectAll("text").attr("x", function (d) {
            return d.width / 2;
          });

          nodeEnter
            .filter(function (d) {
              return d.children || d._children;
            })
            .append("text")
            .attr("class", "plus-sign")
            .attr("x", function (d) {
              return d.width;
            })
            .attr("y", 0)
            .attr("dy", ".35em")
            .style("fill", "black")
            .attr("text-anchor", "middle")
            .text("+");

          var nodeUpdate = nodeEnter.merge(node);

          nodeUpdate.select(".plus-sign").style("display", function (d) {
            return d._children ? "inline" : "none";
          });

          nodeUpdate
            .transition()
            .duration(duration)
            .attr("transform", function (d) {
              return "translate(" + d.y + "," + d.x + ")";
            });
          var nodeExit = node
            .exit()
            .transition()
            .duration(duration)
            .attr("transform", function (d) {
              return "translate(" + source.y + "," + source.x + ")";
            })
            .remove();
          nodeExit.select("rect").style("opacity", 1e-6);
          nodeExit.select("rect").attr("stroke-opacity", 1e-6);
          nodeExit.selectAll("text").style("fill-opacity", 1e-6);
          var link = svg.selectAll("path.link").data(links, function (d) {
            return d.id;
          });
          var linkEnter = link
            .enter()
            .insert("path", "g")
            .attr("class", "link")
            .style("stroke", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.stroke)
                  return p.data.style.stroke;
                p = p.parent;
              }
              return colors.link;
            })
            .attr("d", function (d) {
              var o = { x: source.x0, y: source.y0 };
              return diagonal(o, o);
            });
          var linkUpdate = linkEnter.merge(link);
          linkUpdate
            .transition()
            .duration(duration)
            .attr("d", function (d) {
              return diagonal(d, d.parent);
            });
          var linkExit = link
            .exit()
            .transition()
            .duration(duration)
            .attr("d", function (d) {
              var o = { x: source.x, y: source.y };
              return diagonal(o, o);
            })
            .remove();
          nodes.forEach(function (d) {
            d.x0 = d.x;
            d.y0 = d.y;
          });
          function diagonal(s, d) {
            var path = `M ${s.y} ${s.x}
                    C ${(s.y + d.y) / 2} ${s.x},
                      ${(s.y + d.y) / 2} ${d.x},
                      ${d.y} ${d.x}`;
            return path;
          }
          function click(d) {
            if (d.children) {
              d._children = d.children;
              d.children = null;
            } else {
              d.children = d._children;
              d._children = null;
              if (d.depth === 0 && d.children) {
                d.children.forEach(collapse);
              }
            }
            update(d);
          }
        }

        function expand(d) {
          if (d._children) {
            d.children = d._children;
            d._children = null;
          }
          if (d.children) {
            d.children.forEach(expand);
          }
        }

        var actionBar = d3
          .select("body")
          .append("div")
          .attr("class", "action-bar")
          .style("position", "fixed")
          .style("top", "10px")
          .style("left", "10px")
          .style("z-index", "1000")
          .style("display", "flex")
          .style("gap", "10px");

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-arrows-expand"></i> Expand All')
          .on("click", function () {
            expand(root);
            update(root);
          });

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-arrows-collapse"></i> Collapse All')
          .on("click", function () {
            root.children.forEach(collapse);
            update(root);
          });

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-aspect-ratio"></i> Reset Zoom')
          .on("click", function () {
            svgSelection
              .transition()
              .duration(750)
              .call(
                zoom.transform,
                d3.zoomIdentity.translate(margin.left, margin.top),
              );
          });
      });
    </script>
  </body>
</html>
