    <script>
      const questions = [
        { english: "Okay.", answers: ["OK", "D'accord", "Ça marche"] },
        {
          english: "We'll cook at 3 p.m.",
          answers: ["On cuisinera à 15 h", "On va cuisiner à 15 h"],
        },
        {
          english: "I can't wait to not have to garden anymore in Penang.",
          answers: [
            "J'ai trop hâte de plus avoir à jardiner à Penang",
            "J'ai trop hâte de ne plus avoir à jardiner à Penang",
          ],
        },
        { english: "Done.", answers: ["C'est fait", "Fait", "Voilà"] },
        {
          english: "Of course.",
          answers: ["Bien sûr", "Évidemment", "Bien sûr que oui"],
        },
        {
          english: "We can't.",
          answers: ["Nous, on peut pas", "Nous, on ne peut pas"],
        },
        {
          english: "They're forecasting around 38 degrees.",
          answers: [
            "Ils annoncent dans les 38 degrés",
            "Ils annoncent dans les 38 degrés",
            "Ils prévoient dans les 38 degrés",
            "On annonce dans les 38 degrés",
          ],
        },
        {
          english: "Go sit down.",
          answers: ["Va t'asseoir", "Va t'asseoir", "Va t'installer"],
        },
        {
          english: "What else?",
          answers: ["Quoi d'autre", "Quoi d'autre ?", "Et quoi d'autre"],
        },
        {
          english:
            "We still have couch grass invading everything from the golf course.",
          answers: [
            "On a encore du chiendent qui envahit tout depuis le terrain de golf",
            "On a encore du chiendent qui envahit tout depuis le golf",
          ],
        },
        {
          english: "I'll make room.",
          answers: ["Je vais faire de la place", "Je fais de la place"],
        },
      ];
    </script>
