    <script>
      const questions = [
        { english: "Thank you!", answers: ["Merci !", "Merci"] },
        { english: "Not too much.", answers: ["Pas trop"] },
        {
          english: "I'll make two trips.",
          answers: ["Je ferai deux allers-retours"],
        },
        { english: "He's a genius, right?", answers: ["C'est un génie, hein"] },
        {
          english:
            "I mean, he has slowed down with age but he still has a lot of energy.",
          answers: [
            "Enfin, il a ralenti avec l'âge, mais il a encore plein d'énergie",
          ],
          note: "Other ways to say \"I mean\": je veux dire is the most literal match and works in any register — it introduces a clarification or correction, just like enfin does here. C'est-à-dire (\"that is to say\") is more formal and usually restates something more precisely rather than softening it — closer to \"in other words\". En fait (\"actually/in fact\") corrects or adds a nuance to what was just said, but doesn't have the hesitant, self-interrupting feel of enfin. Enfin itself is the most conversational option — it often signals the speaker catching themselves mid-thought to qualify a claim, which fits this sentence's back-and-forth (he's slowed down, BUT he still has energy).",
        },
        {
          english: "Otherwise, they won't hold up.",
          answers: ["Sinon, elles tiendront pas le coup"],
        },
        {
          english:
            "By the way, you shouldn't wait too long to load the bricks into the car.",
          answers: [
            "Au fait, tu devrais pas trop tarder à charger les briques dans la voiture",
          ],
        },
        { english: "Oh thank you.", answers: ["Oh merci"] },
        {
          english: "He'll be here in a moment.",
          answers: ["Il arrive dans un instant"],
        },
        { english: "He's tough.", answers: ["Il est costaud"] },
      ];
    </script>
