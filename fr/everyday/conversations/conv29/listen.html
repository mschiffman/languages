<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Dictation - 10 Levels</title>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-CHXHM9CZKM");
    </script>
    <link href="/img/favicon.png" rel="icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
      }
      .dictation-card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        width: 100%;
      }
      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 10px;
      }
      .level-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        background: #f8f9fa;
        padding: 10px;
        border-radius: 8px;
      }
      .level-btn {
        background: white;
        border: 1px solid #dcdcdc;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        color: #7f8c8d;
        transition: all 0.2s;
      }
      .level-btn:hover {
        background: #ecf0f1;
        color: #2c3e50;
      }
      .level-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .level-indicator {
        font-weight: bold;
        color: #3498db;
        text-transform: uppercase;
        font-size: 0.9rem;
      }
      .audio-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }
      .btn-audio {
        background: #e1f5fe;
        color: #0288d1;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-audio:hover {
        background: #b3e5fc;
        transform: scale(1.05);
      }
      .btn-slow {
        background: #fff3e0;
        color: #f57c00;
      }
      .btn-slow:hover {
        background: #ffe0b2;
      }
      .btn-hint {
        background: #f3e5f5;
        color: #8e24aa;
      }
      .btn-hint:hover {
        background: #e1bee7;
      }
      #player {
        display: none;
      }
      .hint-box {
        display: none;
        margin: -10px 0 20px;
        padding: 12px 15px;
        border-radius: 8px;
        background: #f3e5f5;
        color: #6a1b9a;
        font-style: italic;
        text-align: center;
      }
      .hint-box.visible {
        display: block;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1.1rem;
        font-family: "Segoe UI", sans-serif;
        resize: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }
      textarea:focus {
        outline: none;
        border-color: #3498db;
      }
      .feedback-area {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background: #fafafa;
        border: 1px dashed #ccc;
        min-height: 40px;
        font-size: 1.1rem;
        line-height: 1.6;
      }
      .diff-correct {
        color: #27ae60;
        font-weight: bold;
      }
      .diff-missing {
        color: #c0392b;
        text-decoration: line-through;
        opacity: 0.6;
        margin-right: 5px;
      }
      .diff-added {
        color: #2980b9;
        text-decoration: underline;
        font-weight: bold;
      }
      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }
      button.action-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-check {
        background: #2ecc71;
        color: white;
      }
      .btn-check:hover {
        background: #27ae60;
      }
      .btn-reveal {
        background: #f39c12;
        color: white;
      }
      .btn-reset {
        background: #95a5a6;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="dictation-card">
      <h2>🎧 Listening Lab</h2>
      <div class="level-bar">
        <button class="level-btn" id="prev-btn" onclick="changeLevel(-1)">
          ◀ Prev
        </button>
        <span class="level-indicator" id="level-display">Level 1 / 10</span>
        <button class="level-btn" id="next-btn" onclick="changeLevel(1)">
          Next ▶
        </button>
      </div>
      <div class="audio-controls">
        <button class="btn-audio" onclick="playAudio('m')">
          <span>👨</span> Male
        </button>
        <button class="btn-audio btn-slow" onclick="playAudio('f')">
          <span>👩</span> Female
        </button>
        <button class="btn-audio btn-hint" onclick="toggleHint()">
          <span>💡</span> Hint
        </button>
      </div>
      <audio id="player"></audio>
      <div class="hint-box" id="hint-box"></div>
      <textarea id="user-input" placeholder="Type what you hear..."></textarea>
      <div id="feedback" class="feedback-area">
        <span style="color: #aaa; font-style: italic"
          >Feedback will appear here...</span
        >
      </div>
      <div class="controls">
        <button class="action-btn btn-check" onclick="checkDictation()">
          Check
        </button>
        <button class="action-btn btn-reset" onclick="resetDictation()">
          Reset
        </button>
        <button class="action-btn btn-reveal" onclick="revealAnswer()">
          Reveal
        </button>
      </div>
    </div>

    <script>
      const sentences = [
        "Enfin, il a ralenti avec l'âge, mais il a encore plein d'énergie.",
        "alors je devrais me reposer.",
        "Oh non, ma sœur s'est fait piquer une fois aussi.",
        "C'est un génie, hein ?",
        "Salut Percida, j'ai quelque chose pour toi.",
        "Entre, je t'en prie.",
        "Merci !",
        "Ah, la voilà.",
        "Je sais.",
        "Celles sur la terrasse sont toutes à toi.",
        "Sinon, elles tiendront pas le coup.",
        "Il va faire de plus en plus chaud.",
        "Goûte-moi ça.",
        "Ah, le voilà.",
        "Je ferai deux allers-retours.",
        "Au fait, tu devrais pas trop tarder à charger les briques dans la voiture.",
        "Il arrive dans un instant.",
        "Percida arrive dans vingt minutes pour récupérer les briques.",
        "Je me suis fait piquer par une abeille.",
        "Mmm... c'est trop bon.",
        "Il va faire 37 degrés aujourd'hui.",
        "Un homme en or.",
        "Et sers-toi de ce chariot pour transporter les briques.",
        "Merci.",
        "Moi, j'en ferai pas la moitié arrivée à son âge.",
        "J'imagine qu'elles sont énervées à cause de la chaleur.",
        "J'ai tout de suite mis de la lotion à la calamine.",
        "Oh merci.",
        "Laisse-m'en quelques-unes pour mes projets dans le jardin.",
        "J'ai pas envie que tu t'esquintes les mains.",
        "Ah oui, je ferais mieux de m'y mettre tout de suite.",
        "Merci.",
        "Oui, je pense.",
        "Elle dit que j'ai passé ma vie à m'occuper de tout le monde,",
        "Ça fait mal ?",
        "Il est costaud.",
        "Robert est aux toilettes.",
        "Ah oui, c'est sûr.",
        "Ah, ça te dirait, ce plant de sauge ?",
        "Alors malgré la pluie d'hier soir, j'ai dû sortir arroser les plantes.",
        "En même temps, à 80 ans, il en fait encore beaucoup.",
        "Marissa ne veut pas que je l'aide au jardin.",
        "Elle va prendre ce tas-là.",
        "J'adore la sauge.",
        "Pas trop.",
        "J'ai fait ces petits pains aux pommes de terre ce matin.",
        "Tiens, prends ces gants.",
        "Elle peut supporter dans les 450 kilos.",
        "Fais gaffe à pas surcharger ta voiture.",
        "D'accord.",
        "Ils sont délicieux.",
      ];

      const translations = [
        "I mean, he has slowed down with age but he still has a lot of energy.",
        "so I should rest.",
        "Oh no, my sister got stung once too.",
        "He's a genius, right?",
        "Hi Percida, I have something for you.",
        "Come in, please.",
        "Thank you!",
        "Ah, there she is.",
        "I know.",
        "The ones on the terrace are all yours.",
        "Otherwise, they won't hold up.",
        "It's going to get hotter and hotter.",
        "Try this.",
        "Ah, there he is.",
        "I'll make two trips.",
        "By the way, you shouldn't wait too long to load the bricks into the car.",
        "He'll be here in a moment.",
        "Percida is arriving in twenty minutes to pick up the bricks.",
        "I got stung by a bee.",
        "Mmm... this is so good.",
        "It's going to be 37 degrees today.",
        "A wonderful man.",
        "And use this cart to move the bricks.",
        "Thanks.",
        "Me, I won't do half as much once I reach his age.",
        "I imagine they're irritable because of the heat.",
        "I put on calamine lotion right away.",
        "Oh thank you.",
        "Leave me a few for my garden projects.",
        "I don't want you to hurt your hands.",
        "Oh yes, I'd better get started right away.",
        "Thank you.",
        "Yes, I think so.",
        "She says I've worked hard my whole life taking care of everyone,",
        "Does it hurt?",
        "He's tough.",
        "Robert is in the bathroom.",
        "Oh yes, for sure.",
        "Oh, would you like this sage plant?",
        "So despite last night's rain, I had to go out and water the plants.",
        "At the same time, at 80 years old, he still does a lot.",
        "Marissa doesn't want me to help her in the garden.",
        "She's going to take that pile there.",
        "I love sage.",
        "Not too much.",
        "I made these little potato rolls this morning.",
        "Here, take these gloves.",
        "It can handle around 450 kilos.",
        "Be careful not to overload your car.",
        "Okay.",
        "They're delicious.",
      ];

      let currentIndex = 0;
      const audioBase =
        "https://languages.rmlives.com/lessons/everyday/conv29/listen/";

      function changeLevel(direction) {
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= sentences.length)
          currentIndex = sentences.length - 1;
        updateUI();
        resetDictation();
      }

      function updateUI() {
        document.getElementById("level-display").innerText =
          `Level ${currentIndex + 1} / ${sentences.length}`;
        document.getElementById("prev-btn").disabled = currentIndex === 0;
        document.getElementById("next-btn").disabled =
          currentIndex === sentences.length - 1;
      }

      function playAudio(gender) {
        const num = String(currentIndex + 1).padStart(2, "0");
        const player = document.getElementById("player");
        player.src = `${audioBase}${num}-${gender}.mp3`;
        player.play();
      }

      function checkDictation() {
        const userText = document.getElementById("user-input").value.trim();
        const feedbackDiv = document.getElementById("feedback");
        if (!userText) {
          feedbackDiv.innerHTML =
            '<span style="color:#e74c3c">Please type something first!</span>';
          return;
        }
        feedbackDiv.innerHTML = compareStrings(
          sentences[currentIndex],
          userText,
        );
      }

      function revealAnswer() {
        document.getElementById("user-input").value = sentences[currentIndex];
        checkDictation();
      }

      function resetDictation() {
        document.getElementById("user-input").value = "";
        document.getElementById("feedback").innerHTML =
          '<span style="color:#aaa; font-style:italic;">Feedback will appear here...</span>';
        const hintBox = document.getElementById("hint-box");
        hintBox.classList.remove("visible");
        hintBox.innerText = "";
      }

      function toggleHint() {
        const hintBox = document.getElementById("hint-box");
        if (hintBox.classList.contains("visible")) {
          hintBox.classList.remove("visible");
        } else {
          hintBox.innerText = translations[currentIndex];
          hintBox.classList.add("visible");
        }
      }

      function compareStrings(correct, user) {
        let html = "";
        const correctWords = correct.split(" ");
        const userWords = user.split(" ");
        const maxLength = Math.max(correctWords.length, userWords.length);
        for (let i = 0; i < maxLength; i++) {
          const cWord = correctWords[i] || "";
          const uWord = userWords[i] || "";
          const cleanC = cWord.toLowerCase().replace(/[.,?!]/g, "");
          const cleanU = uWord.toLowerCase().replace(/[.,?!]/g, "");
          if (cleanC === cleanU) {
            html += `<span class="diff-correct">${cWord}</span> `;
          } else {
            if (cWord) html += `<span class="diff-added">${cWord}</span> `;
            if (uWord) html += `<span class="diff-missing">${uWord}</span> `;
          }
        }
        return html;
      }

      updateUI();
    </script>
    <script src="/assets/js/exercise-feedback.js"></script>
    <script type="module" src="../../../../assets/js/nav-utensils.js"></script>
  </body>
</html>
