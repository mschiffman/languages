    <script>
      const questions = [
        {
          english: "Keep me posted.",
          answers: ["Tiens-moi au courant", "Tiens-moi au jus"],
        },
        {
          english: "Now I bring everything back to AI.",
          answers: [
            "Maintenant, je ramène tout à l'IA",
            "Maintenant je ramène tout à l'IA",
          ],
        },
        {
          english:
            "Maybe they stack the old macarons for the display and make fresh ones for selling.",
          answers: [
            "Peut-être qu'ils empilent les vieux macarons pour la vitrine et qu'ils en font des frais pour la vente",
            "Peut-être qu'ils empilent les vieux macarons pour la vitrine et en font des frais pour la vente",
          ],
        },
        {
          english: "They said yours will be ready tomorrow.",
          answers: [
            "Ils ont dit que les tiennes seront prêtes demain",
            "Ils ont dit que les tiennes seraient prêtes demain",
          ],
        },
        {
          english: "Well, each one has its strengths and weaknesses.",
          answers: [
            "Ben, elles ont chacune leurs points forts et leurs points faibles",
            "Bah, elles ont chacune leurs points forts et leurs points faibles",
          ],
        },
        {
          english: "I can't really see macarons lasting that long.",
          answers: ["Je vois mal les macarons tenir aussi longtemps"],
        },
        {
          english: "Yours need to be cut and fitted onto your sunglasses.",
          answers: [
            "Les tiennes, il faut les tailler et les monter sur tes lunettes de soleil",
            "Les tiennes, faut les tailler et les monter sur tes lunettes de soleil",
          ],
        },
        {
          english: "Whatever you want.",
          answers: ["Comme tu veux", "Comme tu veux", "Comme tu voudras"],
        },
        {
          english:
            "They eat quality food in small portions, whereas Americans eat huge portions of mediocre stuff.",
          answers: [
            "Ils mangent de la qualité en petites portions, alors que les Américains, ils mangent de grosses portions de trucs médiocres",
          ],
        },
        {
          english: "They said it would take between twenty and thirty minutes.",
          answers: [
            "Ils ont dit que ça prendrait entre vingt et trente minutes",
            "Ils ont dit que ça prendrait entre 20 et 30 minutes",
          ],
        },
      ];
