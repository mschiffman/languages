    <script>
      const questions = [
        { english: "Oh, thanks.", answers: ["Oh, merci", "Ah, merci"] },
        { english: "And mine?", answers: ["Et les miennes", "Et les miens"] },
        {
          english:
            "Oh, yesterday when I was at Costco, I saw the salmon sashimi I like.",
          answers: [
            "Ah, hier quand j'étais à Costco, j'ai vu le sashimi de saumon que j'aime",
            "Ah, hier quand j'étais à Costco, j'ai vu le sashimi de saumon que j'aime bien",
            "Ah, hier quand j'étais chez Costco, j'ai vu le sashimi de saumon que j'aime",
          ],
        },
        {
          english:
            "Do you remember that macaron shop, with stacks of macarons in the window?",
          answers: [
            "Tu te souviens de cette boutique de macarons, avec des piles de macarons en vitrine",
            "Tu te rappelles cette boutique de macarons, avec des piles de macarons en vitrine",
          ],
        },
        {
          english: "We can go at the same time.",
          answers: [
            "On pourra y aller en même temps",
            "On peut y aller en même temps",
          ],
        },
        {
          english: "That's bad, right?",
          answers: ["C'est grave, non", "C'est grave, hein"],
        },
        { english: "I doubt it.", answers: ["Ça m'étonnerait", "J'en doute"] },
        { english: "Ok.", answers: ["Ok", "D'accord", "Ça marche"] },
        {
          english: "How many AIs do you need?",
          answers: [
            "Il t'en faut combien, des IA",
            "Il t'en faut combien, des IA",
            "Combien d'IA il te faut",
          ],
        },
        {
          english: "That makes sense.",
          answers: ["Ça se tient", "Ça se tient", "C'est logique"],
        },
      ];
    </script>
