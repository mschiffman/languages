    <script>
      const questions = [
        {
          english: "I have an appointment tomorrow at 9 o'clock.",
          answers: [
            "Moi, j'ai rendez-vous demain à 9 heures",
            "Moi, j'ai un rendez-vous demain à 9 heures",
            "J'ai rendez-vous demain à 9 heures",
          ],
        },
        {
          english: "So it doesn't hurt to have several.",
          answers: [
            "Alors ça mange pas de pain d'en avoir plusieurs",
            "Alors ça ne mange pas de pain d'en avoir plusieurs",
          ],
        },
        {
          english: "Plus, the French don't eat much.",
          answers: [
            "Et puis les Français, ils mangent pas beaucoup",
            "Et puis les Français, ils ne mangent pas beaucoup",
          ],
        },
        {
          english: "You need to bring your sunglasses.",
          answers: [
            "Faut que t'apportes tes lunettes de soleil",
            "Il faut que t'apportes tes lunettes de soleil",
            "Faut que tu apportes tes lunettes de soleil",
            "Il faut que tu apportes tes lunettes de soleil",
            "Faut que t'amènes tes lunettes de soleil",
            "Il faut que t'amènes tes lunettes de soleil",
          ],
        },
        {
          english: "You see, that's why I love you.",
          answers: ["Tu vois, c'est pour ça que je t'aime"],
        },
        {
          english: "I've heard that obesity is gaining ground in Europe too.",
          answers: [
            "J'ai entendu dire que l'obésité gagne du terrain en Europe aussi",
            "J'ai entendu dire que l'obésité gagne du terrain en Europe aussi",
            "J'ai entendu dire que l'obésité gagnait du terrain en Europe aussi",
          ],
        },
        {
          english: "No problem.",
          answers: ["Pas de souci", "Pas de problème", "Aucun souci"],
        },
        {
          english: "I dreamed about a sumptuous French pastry shop last night.",
          answers: [
            "J'ai rêvé d'une pâtisserie française somptueuse cette nuit",
            "J'ai rêvé d'une somptueuse pâtisserie française cette nuit",
          ],
        },
        {
          english: "I know the British are catching up to us on that.",
          answers: [
            "Je sais que les Anglais sont en train de nous rattraper là-dessus",
            "Je sais que les Britanniques sont en train de nous rattraper là-dessus",
          ],
        },
        {
          english:
            "It might be cheaper to do that in Malaysia, but we don't know how good it is.",
          answers: [
            "Ça serait peut-être moins cher de faire ça en Malaisie, mais on sait pas ce que ça vaut",
            "Ça serait peut-être moins cher de faire ça en Malaisie, mais on ne sait pas ce que ça vaut",
          ],
        },
      ];
    </script>
