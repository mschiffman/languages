<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mind Map - Conversation 28</title>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-CHXHM9CZKM");
    </script>

    <!-- Favicons -->
    <link href="/img/favicon.png" rel="icon" />

    <link rel="stylesheet" href="../../../../assets/css/tree.css" />
  </head>

  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.2.2/d3.min.js"></script>
    <script>
      var treeData = {
        name: "Conversation 28",
        children: [
          {
            name: "La poignée cassée et le dermato",
            style: { stroke: "#007850", fill: "#007850" },
            children: [
              { name: "Le trou de la poignée - the hole for the handle" },
              { name: "Une poignée de rechange - a replacement handle" },
              { name: "Home Depot - Home Depot" },
              { name: "Le rendez-vous chez le dermato - the dermatologist appointment" },
              { name: "À 10h10 - at 10:10" },
              { name: "Partir à 9h30 - leaving at 9:30" },
              { name: "Trente-trois minutes d'ici - 33 minutes from here" },
            ],
          },
          {
            name: "Le petit-déjeuner et le départ",
            style: { stroke: "#e07b39", fill: "#e07b39" },
            children: [
              { name: "Mange ton petit-déj - eat your breakfast" },
              { name: "J'ai déjà mangé - I already ate" },
              { name: "Partir tout de suite - leaving right away" },
              { name: "C'est encore tôt - it's still early" },
              { name: "J'y vais - I'm off" },
              { name: "Un bisou avant de partir - a kiss before leaving" },
              { name: "Fais attention sur la route - be careful on the road" },
            ],
          },
          {
            name: "L'humidité et la chaleur",
            style: { stroke: "#9e2a00", fill: "#9e2a00" },
            children: [
              { name: "Trempée de sueur - drenched in sweat" },
              { name: "Le taux d'humidité - the humidity level" },
              { name: "97% d'humidité - 97% humidity" },
              { name: "C'est étouffant dehors - it's stifling outside" },
              { name: "À cause de la pluie et des arroseurs - because of the rain and sprinklers" },
            ],
          },
          {
            name: "Le cardinal et les oiseaux",
            style: { stroke: "#0070a8", fill: "#0070a8" },
            children: [
              { name: "Un cardinal rouge - a red cardinal" },
              { name: "Le plateau d'eau vide - the empty water tray" },
              { name: "Le langage corporel - body language" },
              { name: "Remplir les plateaux d'eau - filling the water trays" },
              { name: "Les bains d'oiseaux - the birdbaths" },
              { name: "Se rafraîchir - to cool off" },
            ],
          },
          {
            name: "Les chardonnerets et les papillons",
            style: { stroke: "#7b02b5", fill: "#7b02b5" },
            children: [
              { name: "Les chardonnerets - the goldfinches" },
              { name: "Le tournesol - the sunflower" },
              { name: "Farouches - skittish" },
              { name: "Les papillons s'en fichent - the butterflies don't care" },
              { name: "Se nourrir sur une fleur - feeding on a flower" },
              { name: "Boire du nectar - drinking nectar" },
              { name: "Digérer vite - digesting quickly" },
            ],
          },
          {
            name: "Expressions utiles",
            style: { stroke: "#006666", fill: "#006666" },
            children: [
              { name: "Quand faut manger, faut manger ! - when you gotta eat, you gotta eat!" },
              { name: "Oublie pas - don't forget (informal)" },
              { name: "Je peux y aller, là ? - can I go now?" },
              { name: "Bien sûr - of course" },
              { name: "Promis - promise" },
              { name: "C'est vraiment élevé - that's really high" },
              { name: "Ça les aide à - that helps them" },
            ],
          },
        ],
      };

      var colors = {
        node: {
          rootFill: "#1d03e1ff",
          defaultFill: "rgb(39, 43, 77)",
          strokeHasChildren: "rgb(3, 192, 220)",
          strokeLeaf: "rgba(222, 38, 173, 1)",
        },
        text: {
          root: "rgba(255, 255, 255, 1)",
          hasChildren: "#ffffff",
          leaf: "rgba(255, 255, 255, 1)",
        },
        link: "#ccc",
      };

      var margin = { top: 20, right: 90, bottom: 30, left: 90 },
        width = 960 - margin.left - margin.right,
        height = 500 - margin.top - margin.bottom;

      document.addEventListener("DOMContentLoaded", function () {
        var svgSelection = d3
          .select("body")
          .append("svg")
          .attr("width", "100vw")
          .attr("height", "100vh");

        var svg = svgSelection
          .append("g")
          .attr(
            "transform",
            "translate(" + margin.left + "," + margin.top + ")",
          );

        var zoom = d3.zoom().on("zoom", function () {
          svg.attr("transform", d3.event.transform);
        });

        svgSelection
          .call(zoom)
          .call(
            zoom.transform,
            d3.zoomIdentity.translate(margin.left, margin.top),
          );

        var i = 0,
          duration = 750,
          root;
        var treemap = d3.tree().nodeSize([40, 180]);
        root = d3.hierarchy(treeData, function (d) {
          return d.children;
        });
        root.x0 = height / 2;
        root.y0 = 0;
        root.children.forEach(collapse);

        update(root);

        function collapse(d) {
          if (d.children) {
            d._children = d.children;
            d._children.forEach(collapse);
            d.children = null;
          }
        }

        function update(source) {
          var treeData = treemap(root);
          var nodes = treeData.descendants(),
            links = treeData.descendants().slice(1);
          nodes.forEach(function (d) {
            d.x = d.x + height / 2;
          });
          var node = svg.selectAll("g.node").data(nodes, function (d) {
            return d.id || (d.id = ++i);
          });
          var nodeEnter = node
            .enter()
            .append("g")
            .attr("class", "node")
            .attr("transform", function (d) {
              return "translate(" + source.y0 + "," + source.x0 + ")";
            })
            .on("click", click);
          nodeEnter
            .attr("class", "node")
            .attr("r", 1e-6)
            .style("fill", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.fill) return p.data.style.fill;
                p = p.parent;
              }
              return d.parent ? colors.node.defaultFill : colors.node.rootFill;
            });

          nodeEnter
            .append("text")
            .style("fill", function (d) {
              if (d.parent) {
                return d.children || d._children
                  ? colors.text.hasChildren
                  : colors.text.leaf;
              }
              return colors.text.root;
            })
            .attr("dy", ".35em")
            .attr("text-anchor", function (d) {
              return "middle";
            })
            .text(function (d) {
              return d.data.name;
            });

          nodeEnter.each(function (d) {
            var bbox = this.querySelector("text").getBBox();
            d.width = bbox.width + 20;
            d.height = bbox.height + 10;
          });

          var maxDepthWidth = [];
          nodes.forEach(function (d) {
            if (!maxDepthWidth[d.depth] || d.width > maxDepthWidth[d.depth]) {
              maxDepthWidth[d.depth] = d.width;
            }
          });
          var depthY = [0];
          for (var j = 1; j <= maxDepthWidth.length; j++) {
            depthY[j] = depthY[j - 1] + (maxDepthWidth[j - 1] || 0) + 80;
          }
          nodes.forEach(function (d) {
            d.y = depthY[d.depth];
          });

          nodeEnter
            .insert("rect", "text")
            .attr("rx", 6)
            .attr("ry", 6)
            .attr("stroke-width", function (d) {
              return d.parent ? 1 : 0;
            })
            .attr("stroke", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.stroke)
                  return p.data.style.stroke;
                p = p.parent;
              }
              return d.children || d._children
                ? colors.node.strokeHasChildren
                : colors.node.strokeLeaf;
            })
            .attr("stroke-dasharray", "0")
            .attr("stroke-opacity", function (d) {
              return d.children || d._children ? "1" : "0.6";
            })
            .attr("x", 0)
            .attr("y", function (d) {
              return -(d.height / 2);
            })
            .attr("width", function (d) {
              return d.width;
            })
            .attr("height", function (d) {
              return d.height;
            });

          nodeEnter.selectAll("text").attr("x", function (d) {
            return d.width / 2;
          });

          nodeEnter
            .filter(function (d) {
              return d.children || d._children;
            })
            .append("text")
            .attr("class", "plus-sign")
            .attr("x", function (d) {
              return d.width;
            })
            .attr("y", 0)
            .attr("dy", ".35em")
            .style("fill", "black")
            .attr("text-anchor", "middle")
            .text("+");

          var nodeUpdate = nodeEnter.merge(node);

          nodeUpdate.select(".plus-sign").style("display", function (d) {
            return d._children ? "inline" : "none";
          });

          nodeUpdate
            .transition()
            .duration(duration)
            .attr("transform", function (d) {
              return "translate(" + d.y + "," + d.x + ")";
            });
          var nodeExit = node
            .exit()
            .transition()
            .duration(duration)
            .attr("transform", function (d) {
              return "translate(" + source.y + "," + source.x + ")";
            })
            .remove();
          nodeExit.select("rect").style("opacity", 1e-6);
          nodeExit.select("rect").attr("stroke-opacity", 1e-6);
          nodeExit.selectAll("text").style("fill-opacity", 1e-6);
          var link = svg.selectAll("path.link").data(links, function (d) {
            return d.id;
          });
          var linkEnter = link
            .enter()
            .insert("path", "g")
            .attr("class", "link")
            .style("stroke", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.stroke)
                  return p.data.style.stroke;
                p = p.parent;
              }
              return colors.link;
            })
            .attr("d", function (d) {
              var o = { x: source.x0, y: source.y0 };
              return diagonal(o, o);
            });
          var linkUpdate = linkEnter.merge(link);
          linkUpdate
            .transition()
            .duration(duration)
            .attr("d", function (d) {
              return diagonal(d, d.parent);
            });
          var linkExit = link
            .exit()
            .transition()
            .duration(duration)
            .attr("d", function (d) {
              var o = { x: source.x, y: source.y };
              return diagonal(o, o);
            })
            .remove();
          nodes.forEach(function (d) {
            d.x0 = d.x;
            d.y0 = d.y;
          });
          function diagonal(s, d) {
            var path = `M ${s.y} ${s.x}
                    C ${(s.y + d.y) / 2} ${s.x},
                      ${(s.y + d.y) / 2} ${d.x},
                      ${d.y} ${d.x}`;
            return path;
          }
          function click(d) {
            if (d.children) {
              d._children = d.children;
              d.children = null;
            } else {
              d.children = d._children;
              d._children = null;
              if (d.depth === 0 && d.children) {
                d.children.forEach(collapse);
              }
            }
            update(d);
          }
        }

        function expand(d) {
          if (d._children) {
            d.children = d._children;
            d._children = null;
          }
          if (d.children) {
            d.children.forEach(expand);
          }
        }

        var actionBar = d3
          .select("body")
          .append("div")
          .attr("class", "action-bar")
          .style("position", "fixed")
          .style("top", "10px")
          .style("left", "10px")
          .style("z-index", "1000")
          .style("display", "flex")
          .style("gap", "10px");

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-arrows-expand"></i> Expand All')
          .on("click", function () {
            expand(root);
            update(root);
          });

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-arrows-collapse"></i> Collapse All')
          .on("click", function () {
            root.children.forEach(collapse);
            update(root);
          });

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-aspect-ratio"></i> Reset Zoom')
          .on("click", function () {
            svgSelection
              .transition()
              .duration(750)
              .call(
                zoom.transform,
                d3.zoomIdentity.translate(margin.left, margin.top),
              );
          });
      });
    </script>
  </body>
</html>
