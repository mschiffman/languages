    <script>
      const questions = [
        {
          english: "Do you want to come talk to me?",
          answers: ["Tu veux venir me parler", "Tu veux venir me parler ?"],
        },
        { english: "All the time.", answers: ["Tout le temps"] },
        { english: "You cook, I eat.", answers: ["Tu cuisines, je mange"] },
        {
          english: "This roll is so good.",
          answers: [
            "Il est trop bon, ce petit pain",
            "Ce petit pain est trop bon",
          ],
        },
        {
          english: "Like this. (showing how to do sth)",
          answers: ["Comme ça"],
        },
        {
          english: "I don't doubt it.",
          answers: ["J'en doute pas", "Je n'en doute pas"],
        },
        {
          english: "Where is your wife?",
          answers: [
            "Elle est où, ta femme",
            "Elle est où, ta femme ?",
            "Où est ta femme",
            "Où est ta femme ?",
          ],
        },
        { english: "Why not?", answers: ["Pourquoi pas", "Pourquoi pas ?"] },
        { english: "That's why.", answers: ["C'est pour ça"] },
        {
          english: "That's why you always have to agree with me",
          answers: [
            "C'est pour ça que tu dois toujours me donner raison",
            "C'est pour ça que tu dois toujours me donner raison",
          ],
        },
      ];
    </script>
