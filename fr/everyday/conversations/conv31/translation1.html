    <div class="translation-card">

    <script>
      const questions = [
        { english: "It smells good.", answers: ["Ça sent bon"] },
        {
          english: "Hey, it's funny.",
          answers: [
            "Tiens, c'est marrant",
            "Tiens, c'est drôle",
            "Tiens, c'est rigolo",
          ],
        },
        {
          english: "Who would say no to this pretty little face?",
          answers: [
            "Qui dirait non à ce joli minois",
            "Qui dirait non à ce joli minois ?",
          ],
        },
        {
          english: "Isn't that already the case?",
          answers: [
            "C'est pas déjà le cas",
            "C'est pas déjà le cas ?",
            "Ce n'est pas déjà le cas",
            "Ce n'est pas déjà le cas ?",
          ],
        },
        {
          english: "Oh, come on. (dismissive 'Oh please')",
          answers: ["ben voyons", "bah voyons"],
        },
        {
          english: "Yeah, right! (sarcastic)",
          answers: ["Tu parles", "Tu parles !"],
        },
        {
          english: "Do you want a bite (of it)?",
          answers: [
            "T'en veux une bouchée",
            "T'en veux une bouchée ?",
            "Tu en veux une bouchée",
            "Tu en veux une bouchée ?",
          ],
        },
        {
          english: "Totally / For sure / Absolutely",
          answers: ["Carrément", "Grave", "Absolument"],
        },
        {
          english: "You're really lucky.",
          answers: [
            "t'as vraiment de la chance",
            "tu as vraiment de la chance",
          ],
        },
        {
          english: "You tell me no often enough, though.",
          answers: ["Tu me dis non assez souvent, pourtant"],
        },
      ];
    </script>

    <script src="exercise-feedback.js"></script>
