<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Dictation - 10 Levels</title>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-CHXHM9CZKM");
    </script>
    <link href="/img/favicon.png" rel="icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
      }
      .dictation-card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        width: 100%;
      }
      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 10px;
      }
      .level-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        background: #f8f9fa;
        padding: 10px;
        border-radius: 8px;
      }
      .level-btn {
        background: white;
        border: 1px solid #dcdcdc;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        color: #7f8c8d;
        transition: all 0.2s;
      }
      .level-btn:hover {
        background: #ecf0f1;
        color: #2c3e50;
      }
      .level-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .level-indicator {
        font-weight: bold;
        color: #3498db;
        text-transform: uppercase;
        font-size: 0.9rem;
      }
      .audio-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }
      .btn-audio {
        background: #e1f5fe;
        color: #0288d1;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-audio:hover {
        background: #b3e5fc;
        transform: scale(1.05);
      }
      .btn-slow {
        background: #fff3e0;
        color: #f57c00;
      }
      .btn-slow:hover {
        background: #ffe0b2;
      }
      .btn-hint {
        background: #f3e5f5;
        color: #8e24aa;
      }
      .btn-hint:hover {
        background: #e1bee7;
      }
      #player {
        display: none;
      }
      .hint-box {
        display: none;
        margin: -10px 0 20px;
        padding: 12px 15px;
        border-radius: 8px;
        background: #f3e5f5;
        color: #6a1b9a;
        font-style: italic;
        text-align: center;
      }
      .hint-box.visible {
        display: block;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1.1rem;
        font-family: "Segoe UI", sans-serif;
        resize: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }
      textarea:focus {
        outline: none;
        border-color: #3498db;
      }
      .feedback-area {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background: #fafafa;
        border: 1px dashed #ccc;
        min-height: 40px;
        font-size: 1.1rem;
        line-height: 1.6;
      }
      .diff-correct {
        color: #27ae60;
        font-weight: bold;
      }
      .diff-missing {
        color: #c0392b;
        text-decoration: line-through;
        opacity: 0.6;
        margin-right: 5px;
      }
      .diff-added {
        color: #2980b9;
        text-decoration: underline;
        font-weight: bold;
      }
      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }
      button.action-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-check {
        background: #2ecc71;
        color: white;
      }
      .btn-check:hover {
        background: #27ae60;
      }
      .btn-reveal {
        background: #f39c12;
        color: white;
      }
      .btn-reset {
        background: #95a5a6;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="dictation-card">
      <h2>🎧 Listening Lab</h2>
      <div class="level-bar">
        <button class="level-btn" id="prev-btn" onclick="changeLevel(-1)">
          ◀ Prev
        </button>
        <span class="level-indicator" id="level-display">Level 1 / 10</span>
        <button class="level-btn" id="next-btn" onclick="changeLevel(1)">
          Next ▶
        </button>
      </div>
      <div class="audio-controls">
        <button class="btn-audio" onclick="playAudio('m')">
          <span>👨</span> Male
        </button>
        <button class="btn-audio btn-slow" onclick="playAudio('f')">
          <span>👩</span> Female
        </button>
        <button class="btn-audio btn-hint" onclick="toggleHint()">
          <span>💡</span> Hint
        </button>
      </div>
      <audio id="player"></audio>
      <div class="hint-box" id="hint-box"></div>
      <textarea id="user-input" placeholder="Type what you hear..."></textarea>
      <div id="feedback" class="feedback-area">
        <span style="color: #aaa; font-style: italic"
          >Feedback will appear here...</span
        >
      </div>
      <div class="controls">
        <button class="action-btn btn-check" onclick="checkDictation()">
          Check
        </button>
        <button class="action-btn btn-reset" onclick="resetDictation()">
          Reset
        </button>
        <button class="action-btn btn-reveal" onclick="revealAnswer()">
          Reveal
        </button>
      </div>
    </div>

    <script>
      const sentences = [
        "Ben, la prise, c'est difficile à nettoyer.",
        "Mon cerveau a besoin de souffler.",
        "Il m'en reste 96 %.",
        "On est pas pressés.",
        "Je crois qu'il y a un faux contact.",
        "J'ai besoin d'une pause de toute façon.",
        "Je le fais.",
        "À chaque fois qu'on s'en sert.",
        "Non, c'est bon.",
        "Ça marche pas.",
        "ElevenLabs, ça sonne tellement vrai que je peux utiliser leurs audios pour le shadowing.",
        "On devrait le jeter ?",
        "Je vais juste boire mon thé.",
        "De toute façon, on pourrait pas l'emmener en Malaisie.",
        "Prends ton temps.",
        "Je veux voir si j'arrive à le réparer.",
        "Tu veux que je t'apporte quelque chose ?",
        "Tu veux que je le jette ?",
        "Va te reposer.",
        "Le voyant s'allume pas.",
        "Moi, je vais m'occuper des audios pour mon site.",
        "Sinon, c'est dur de trouver de l'audio propre en ligne.",
        "Non, ça, c'est pour la vie.",
        "Ça fait plus de 20 ans que j'ai ce grill.",
        "C'est fastidieux.",
        "Donc s'il me lâche, c'est pas une grosse perte.",
        "Je prendrai la poêle, c'est tout.",
        "Tu veux utiliser mon Claude ?",
        "Non, ça va, merci.",
        "Ça marche.",
        "Ce grill à pancakes.",
        "Fais en sorte que ce soit parfait.",
        "J'ai passé toute la matinée à relire et à retoucher mon roman.",
        "Qu'est-ce qui marche pas ?",
        "Ah, j'ai épuisé mon quota sur Claude.",
        "Je vais bosser sur mon roman avec Claude, là.",
        "J'ai nettoyé le grill, les broches comprises.",
        "Mais je nettoie pas la prise.",
        "Faut nettoyer les broches de temps en temps.",
        "Non, je vais le mettre dans la buanderie, pour qu'il soit pas dans le passage.",
        "Mais notre mariage aussi, ça fait plus de 20 ans.",
        "Ah, voilà, ça y est, le voyant est allumé maintenant.",
        "Réessaie.",
        "Je le remonte en attendant ?",
        "Normalement, t'as pas besoin de le faire.",
        "Mais ça cuit pas.",
        "Je vais le faire.",
        "D'accord.",
        "Faut que j'attende 5 heures que ça se remette à zéro.",
        "Non, laisse-le sécher.",
      ];

      const translations = [
        "Well, the plug is hard to clean.",
        "My brain needs a breather.",
        "I have 96% left.",
        "We're in no hurry.",
        "I think there's a loose connection.",
        "I need a break anyway.",
        "I do it.",
        "Every time we use it.",
        "No, it's fine.",
        "It's not working.",
        "ElevenLabs sounds so real that I can use their audio for shadowing.",
        "Should we throw it out?",
        "I'll just drink my tea.",
        "Anyway, we couldn't take it to Malaysia.",
        "Take your time.",
        "I want to see if I can manage to fix it.",
        "Do you want me to bring you something?",
        "Do you want me to throw it out?",
        "Go rest.",
        "The light doesn't come on.",
        "I'm going to work on the audio for my site.",
        "Otherwise, it's hard to find clean audio online.",
        "No, that one's for life.",
        "I've had this griddle for more than 20 years.",
        "It's tedious.",
        "So if it dies on me, it's not a big loss.",
        "I'll just use the frying pan, that's all.",
        "Do you want to use my Claude?",
        "No, I'm fine, thanks.",
        "Sounds good.",
        "This pancake griddle.",
        "Make sure it's perfect.",
        "I spent the whole morning rereading and touching up my novel.",
        "What's not working?",
        "Ah, I've used up my Claude quota.",
        "I'm going to work on my novel with Claude, right now.",
        "I cleaned the griddle, prongs included.",
        "But I don't clean the plug.",
        "You have to clean the prongs from time to time.",
        "No, I'll put it in the laundry room, so it's not in the way.",
        "But our marriage is also more than 20 years old.",
        "Ah, there we go, that's it, the light is on now.",
        "Try again.",
        "Should I put it back together in the meantime?",
        "Normally, you don't need to do that.",
        "But it's not cooking.",
        "I will.",
        "Okay.",
        "I have to wait 5 hours for it to reset.",
        "No, let it dry.",
      ];

      let currentIndex = 0;
      const audioBase =
        "https://languages.rmlives.com/lessons/everyday/conv37/listen/";

      function changeLevel(direction) {
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= sentences.length)
          currentIndex = sentences.length - 1;
        updateUI();
        resetDictation();
      }

      function updateUI() {
        document.getElementById("level-display").innerText =
          `Level ${currentIndex + 1} / ${sentences.length}`;
        document.getElementById("prev-btn").disabled = currentIndex === 0;
        document.getElementById("next-btn").disabled =
          currentIndex === sentences.length - 1;
      }

      function playAudio(gender) {
        const num = String(currentIndex + 1).padStart(2, "0");
        const player = document.getElementById("player");
        player.src = `${audioBase}${num}-${gender}.mp3`;
        player.play();
      }

      function checkDictation() {
        const userText = document.getElementById("user-input").value.trim();
        const feedbackDiv = document.getElementById("feedback");
        if (!userText) {
          feedbackDiv.innerHTML =
            '<span style="color:#e74c3c">Please type something first!</span>';
          return;
        }
        feedbackDiv.innerHTML = compareStrings(
          sentences[currentIndex],
          userText,
        );
      }

      function revealAnswer() {
        document.getElementById("user-input").value = sentences[currentIndex];
        checkDictation();
      }

      function resetDictation() {
        document.getElementById("user-input").value = "";
        document.getElementById("feedback").innerHTML =
          '<span style="color:#aaa; font-style:italic;">Feedback will appear here...</span>';
        const hintBox = document.getElementById("hint-box");
        hintBox.classList.remove("visible");
        hintBox.innerText = "";
      }

      function toggleHint() {
        const hintBox = document.getElementById("hint-box");
        if (hintBox.classList.contains("visible")) {
          hintBox.classList.remove("visible");
        } else {
          hintBox.innerText = translations[currentIndex];
          hintBox.classList.add("visible");
        }
      }

      function compareStrings(correct, user) {
        let html = "";
        const correctWords = correct.split(" ");
        const userWords = user.split(" ");
        const maxLength = Math.max(correctWords.length, userWords.length);
        for (let i = 0; i < maxLength; i++) {
          const cWord = correctWords[i] || "";
          const uWord = userWords[i] || "";
          const cleanC = cWord.toLowerCase().replace(/[.,?!]/g, "");
          const cleanU = uWord.toLowerCase().replace(/[.,?!]/g, "");
          if (cleanC === cleanU) {
            html += `<span class="diff-correct">${cWord}</span> `;
          } else {
            if (cWord) html += `<span class="diff-added">${cWord}</span> `;
            if (uWord) html += `<span class="diff-missing">${uWord}</span> `;
          }
        }
        return html;
      }

      updateUI();
    </script>
    <script src="/assets/js/exercise-feedback.js"></script>
    <script type="module" src="../../../../assets/js/nav-utensils.js"></script>
  </body>
</html>
