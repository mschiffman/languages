<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mind Map - Conversation 37</title>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-CHXHM9CZKM");
    </script>

    <!-- Favicons -->
    <link href="/img/favicon.png" rel="icon" />

    <link rel="stylesheet" href="../../../../assets/css/tree.css" />
  </head>

  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.2.2/d3.min.js"></script>
    <script>
      var treeData = {
        name: "Conversation 37",
        children: [
          {
            name: "Le grill à pancakes en panne",
            style: { stroke: "#007850", fill: "#007850" },
            children: [
              { name: "Ça marche pas - it's not working" },
              { name: "Le voyant s'allume pas - the light doesn't come on" },
              {
                name: "Je crois qu'il y a un faux contact - I think there's a loose connection",
              },
              {
                name: "Ça fait plus de 20 ans que j'ai ce grill - I've had this griddle for more than 20 years",
              },
              {
                name: "On pourrait pas l'emmener en Malaisie - we couldn't take it to Malaysia",
              },
              {
                name: "S'il me lâche, c'est pas une grosse perte - if it dies on me, it's not a big loss",
              },
              { name: "Mais ça cuit pas - but it's not cooking" },
              {
                name: "Je prendrai la poêle, c'est tout - I'll just use the frying pan, that's all",
              },
            ],
          },
          {
            name: "Nettoyer et réparer",
            style: { stroke: "#e07b39", fill: "#e07b39" },
            children: [
              {
                name: "Faut nettoyer les broches de temps en temps - you have to clean the prongs from time to time",
              },
              { name: "Je nettoie pas la prise - I don't clean the plug" },
              {
                name: "La prise, c'est difficile à nettoyer - the plug is hard to clean",
              },
              { name: "Réessaie - try again" },
              {
                name: "Le voyant est allumé maintenant - the light is on now",
              },
              {
                name: "J'ai nettoyé le grill, les broches comprises - I cleaned the griddle, prongs included",
              },
              { name: "Laisse-le sécher - let it dry" },
              {
                name: "Je veux voir si j'arrive à le réparer - I want to see if I can fix it",
              },
            ],
          },
          {
            name: "Le sort du grill et la blague du mariage",
            style: { stroke: "#9e2a00", fill: "#9e2a00" },
            children: [
              {
                name: "Tu veux que je le jette ? - do you want me to throw it out?",
              },
              {
                name: "Je le remonte en attendant ? - should I put it back together in the meantime?",
              },
              {
                name: "Je vais le mettre dans la buanderie - I'll put it in the laundry room",
              },
              {
                name: "Pour qu'il soit pas dans le passage - so it's not in the way",
              },
              {
                name: "Notre mariage aussi, ça fait plus de 20 ans - our marriage is also more than 20 years old",
              },
              {
                name: "On devrait le jeter ? - should we throw it out?",
              },
              {
                name: "Non, ça, c'est pour la vie - no, that one's for life",
              },
            ],
          },
          {
            name: "Le roman avec Claude",
            style: { stroke: "#0070a8", fill: "#0070a8" },
            children: [
              {
                name: "Je vais bosser sur mon roman avec Claude - I'm going to work on my novel with Claude",
              },
              {
                name: "J'ai épuisé mon quota sur Claude - I've used up my Claude quota",
              },
              {
                name: "Faut que j'attende 5 heures que ça se remette à zéro - I have to wait 5 hours for it to reset",
              },
              {
                name: "J'ai passé toute la matinée à relire et à retoucher mon roman - I spent the whole morning rereading and touching up my novel",
              },
              { name: "C'est fastidieux - it's tedious" },
              {
                name: "On est pas pressés, prends ton temps - we're in no hurry, take your time",
              },
              {
                name: "Fais en sorte que ce soit parfait - make sure it's perfect",
              },
              {
                name: "Il m'en reste 96 % - I have 96% left",
              },
              {
                name: "Mon cerveau a besoin de souffler - my brain needs a breather",
              },
            ],
          },
          {
            name: "Le site de français et la pause",
            style: { stroke: "#7b02b5", fill: "#7b02b5" },
            children: [
              {
                name: "Je vais m'occuper des audios pour mon site - I'm going to work on the audio for my site",
              },
              {
                name: "Ça sonne tellement vrai - it sounds so real",
              },
              {
                name: "Je peux utiliser leurs audios pour le shadowing - I can use their audio for shadowing",
              },
              {
                name: "C'est dur de trouver de l'audio propre en ligne - it's hard to find clean audio online",
              },
              { name: "Va te reposer - go rest" },
              {
                name: "Tu veux que je t'apporte quelque chose ? - do you want me to bring you something?",
              },
              {
                name: "Je vais juste boire mon thé - I'll just drink my tea",
              },
            ],
          },
          {
            name: "Expressions utiles",
            style: { stroke: "#006666", fill: "#006666" },
            children: [
              { name: "Ça marche - sounds good / that works" },
              { name: "Ça y est - that's it / there we go" },
              { name: "De toute façon - anyway" },
              { name: "C'est bon - it's fine, no worries" },
              { name: "Faut que - gotta, have to" },
              { name: "Ben - well" },
              { name: "En attendant - in the meantime" },
              { name: "Comprises - included" },
            ],
          },
        ],
      };

      var colors = {
        node: {
          rootFill: "#1d03e1ff",
          defaultFill: "rgb(39, 43, 77)",
          strokeHasChildren: "rgb(3, 192, 220)",
          strokeLeaf: "rgba(222, 38, 173, 1)",
        },
        text: {
          root: "rgba(255, 255, 255, 1)",
          hasChildren: "#ffffff",
          leaf: "rgba(255, 255, 255, 1)",
        },
        link: "#ccc",
      };

      var margin = { top: 20, right: 90, bottom: 30, left: 90 },
        width = 960 - margin.left - margin.right,
        height = 500 - margin.top - margin.bottom;

      document.addEventListener("DOMContentLoaded", function () {
        var svgSelection = d3
          .select("body")
          .append("svg")
          .attr("width", "100vw")
          .attr("height", "100vh");

        var svg = svgSelection
          .append("g")
          .attr(
            "transform",
            "translate(" + margin.left + "," + margin.top + ")",
          );

        var zoom = d3.zoom().on("zoom", function () {
          svg.attr("transform", d3.event.transform);
        });

        svgSelection
          .call(zoom)
          .call(
            zoom.transform,
            d3.zoomIdentity.translate(margin.left, margin.top),
          );

        var i = 0,
          duration = 750,
          root;
        var treemap = d3.tree().nodeSize([40, 180]);
        root = d3.hierarchy(treeData, function (d) {
          return d.children;
        });
        root.x0 = height / 2;
        root.y0 = 0;
        root.children.forEach(collapse);

        update(root);

        function collapse(d) {
          if (d.children) {
            d._children = d.children;
            d._children.forEach(collapse);
            d.children = null;
          }
        }

        function update(source) {
          var treeData = treemap(root);
          var nodes = treeData.descendants(),
            links = treeData.descendants().slice(1);
          nodes.forEach(function (d) {
            d.x = d.x + height / 2;
          });
          var node = svg.selectAll("g.node").data(nodes, function (d) {
            return d.id || (d.id = ++i);
          });
          var nodeEnter = node
            .enter()
            .append("g")
            .attr("class", "node")
            .attr("transform", function (d) {
              return "translate(" + source.y0 + "," + source.x0 + ")";
            })
            .on("click", click);
          nodeEnter
            .attr("class", "node")
            .attr("r", 1e-6)
            .style("fill", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.fill) return p.data.style.fill;
                p = p.parent;
              }
              return d.parent ? colors.node.defaultFill : colors.node.rootFill;
            });

          nodeEnter
            .append("text")
            .style("fill", function (d) {
              if (d.parent) {
                return d.children || d._children
                  ? colors.text.hasChildren
                  : colors.text.leaf;
              }
              return colors.text.root;
            })
            .attr("dy", ".35em")
            .attr("text-anchor", function (d) {
              return "middle";
            })
            .text(function (d) {
              return d.data.name;
            });

          nodeEnter.each(function (d) {
            var bbox = this.querySelector("text").getBBox();
            d.width = bbox.width + 20;
            d.height = bbox.height + 10;
          });

          var maxDepthWidth = [];
          nodes.forEach(function (d) {
            if (!maxDepthWidth[d.depth] || d.width > maxDepthWidth[d.depth]) {
              maxDepthWidth[d.depth] = d.width;
            }
          });
          var depthY = [0];
          for (var j = 1; j <= maxDepthWidth.length; j++) {
            depthY[j] = depthY[j - 1] + (maxDepthWidth[j - 1] || 0) + 80;
          }
          nodes.forEach(function (d) {
            d.y = depthY[d.depth];
          });

          nodeEnter
            .insert("rect", "text")
            .attr("rx", 6)
            .attr("ry", 6)
            .attr("stroke-width", function (d) {
              return d.parent ? 1 : 0;
            })
            .attr("stroke", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.stroke)
                  return p.data.style.stroke;
                p = p.parent;
              }
              return d.children || d._children
                ? colors.node.strokeHasChildren
                : colors.node.strokeLeaf;
            })
            .attr("stroke-dasharray", "0")
            .attr("stroke-opacity", function (d) {
              return d.children || d._children ? "1" : "0.6";
            })
            .attr("x", 0)
            .attr("y", function (d) {
              return -(d.height / 2);
            })
            .attr("width", function (d) {
              return d.width;
            })
            .attr("height", function (d) {
              return d.height;
            });

          nodeEnter.selectAll("text").attr("x", function (d) {
            return d.width / 2;
          });

          nodeEnter
            .filter(function (d) {
              return d.children || d._children;
            })
            .append("text")
            .attr("class", "plus-sign")
            .attr("x", function (d) {
              return d.width;
            })
            .attr("y", 0)
            .attr("dy", ".35em")
            .style("fill", "black")
            .attr("text-anchor", "middle")
            .text("+");

          var nodeUpdate = nodeEnter.merge(node);

          nodeUpdate.select(".plus-sign").style("display", function (d) {
            return d._children ? "inline" : "none";
          });

          nodeUpdate
            .transition()
            .duration(duration)
            .attr("transform", function (d) {
              return "translate(" + d.y + "," + d.x + ")";
            });
          var nodeExit = node
            .exit()
            .transition()
            .duration(duration)
            .attr("transform", function (d) {
              return "translate(" + source.y + "," + source.x + ")";
            })
            .remove();
          nodeExit.select("rect").style("opacity", 1e-6);
          nodeExit.select("rect").attr("stroke-opacity", 1e-6);
          nodeExit.selectAll("text").style("fill-opacity", 1e-6);
          var link = svg.selectAll("path.link").data(links, function (d) {
            return d.id;
          });
          var linkEnter = link
            .enter()
            .insert("path", "g")
            .attr("class", "link")
            .style("stroke", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.stroke)
                  return p.data.style.stroke;
                p = p.parent;
              }
              return colors.link;
            })
            .attr("d", function (d) {
              var o = { x: source.x0, y: source.y0 };
              return diagonal(o, o);
            });
          var linkUpdate = linkEnter.merge(link);
          linkUpdate
            .transition()
            .duration(duration)
            .attr("d", function (d) {
              return diagonal(d, d.parent);
            });
          var linkExit = link
            .exit()
            .transition()
            .duration(duration)
            .attr("d", function (d) {
              var o = { x: source.x, y: source.y };
              return diagonal(o, o);
            })
            .remove();
          nodes.forEach(function (d) {
            d.x0 = d.x;
            d.y0 = d.y;
          });
          function diagonal(s, d) {
            var path = `M ${s.y} ${s.x}
                    C ${(s.y + d.y) / 2} ${s.x},
                      ${(s.y + d.y) / 2} ${d.x},
                      ${d.y} ${d.x}`;
            return path;
          }
          function click(d) {
            if (d.children) {
              d._children = d.children;
              d.children = null;
            } else {
              d.children = d._children;
              d._children = null;
              if (d.depth === 0 && d.children) {
                d.children.forEach(collapse);
              }
            }
            update(d);
          }
        }

        function expand(d) {
          if (d._children) {
            d.children = d._children;
            d._children = null;
          }
          if (d.children) {
            d.children.forEach(expand);
          }
        }

        var actionBar = d3
          .select("body")
          .append("div")
          .attr("class", "action-bar")
          .style("position", "fixed")
          .style("top", "10px")
          .style("left", "10px")
          .style("z-index", "1000")
          .style("display", "flex")
          .style("gap", "10px");

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-arrows-expand"></i> Expand All')
          .on("click", function () {
            expand(root);
            update(root);
          });

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-arrows-collapse"></i> Collapse All')
          .on("click", function () {
            root.children.forEach(collapse);
            update(root);
          });

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-aspect-ratio"></i> Reset Zoom')
          .on("click", function () {
            svgSelection
              .transition()
              .duration(750)
              .call(
                zoom.transform,
                d3.zoomIdentity.translate(margin.left, margin.top),
              );
          });
      });
    </script>
  </body>
</html>
