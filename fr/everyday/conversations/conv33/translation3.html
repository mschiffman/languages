    <script>
      const questions = [
        {
          english: "What else do we need?",
          answers: [
            "Qu'est-ce qu'il nous faut d'autre",
            "Qu'est-ce qu'il nous faut d'autre ?",
            "De quoi d'autre on a besoin",
          ],
        },
        {
          english: "Can you scratch my back?",
          answers: [
            "Tu peux me gratter le dos",
            "Tu peux me gratter le dos ?",
            "Tu peux me gratter le dos, s'il te plaît",
          ],
        },
        {
          english: "Anyway, we won't eat out much.",
          answers: [
            "De toute façon, on mangera pas beaucoup dehors",
            "De toute façon, on ne mangera pas beaucoup dehors",
          ],
        },
        {
          english: "What are you going to miss most about America?",
          answers: [
            "Qu'est-ce qui va te manquer le plus de l'Amérique",
            "Qu'est-ce qui va te manquer le plus des États-Unis",
          ],
        },
        { english: "That feels good.", answers: ["Ça fait du bien"] },
        {
          english: "No, higher, a little to the left, a little lower.",
          answers: ["Non, plus haut, un peu à gauche, un peu plus bas"],
        },
        {
          english: "Then maybe we won't need them.",
          answers: [
            "Alors on en aura peut-être pas besoin",
            "Alors on n'en aura peut-être pas besoin",
          ],
        },
        {
          english: "We could never cook in that heat and humidity.",
          answers: [
            "On pourra jamais cuisiner dans cette chaleur et cette humidité",
            "On ne pourra jamais cuisiner dans cette chaleur et cette humidité",
          ],
        },
        {
          english:
            "I'm trying to imagine what it would feel like to live up high.",
          answers: [
            "J'essaie d'imaginer l'effet que ça ferait de vivre en hauteur",
            "J'essaye d'imaginer l'effet que ça ferait de vivre en hauteur",
          ],
        },
        {
          english: "Grab might end up costing more.",
          answers: [
            "Le Grab, ça revient peut-être plus cher",
            "Le Grab, ça reviendra peut-être plus cher",
          ],
        },
      ];
    </script>
