    <script>
      const questions = [
        {
          english: "It'll be like vacation every day.",
          answers: [
            "Ce sera les vacances tous les jours",
            "Ça sera les vacances tous les jours",
          ],
        },
        {
          english:
            "But we need to be realistic about how much longer you'll be able to cook, at your age.",
          answers: [
            "Mais faut être réaliste sur combien de temps tu pourras encore cuisiner, à ton âge",
            "Mais il faut être réaliste sur combien de temps tu pourras encore cuisiner, à ton âge",
          ],
        },
        {
          english: "You mean, at your total beck and call.",
          answers: ["Tu veux dire, corvéable à merci"],
        },
        {
          english: "Let's ask Gemini.",
          answers: ["On va demander à Gemini", "Demandons à Gemini"],
        },
        {
          english: "East or northeast facing, high floor, corner unit…",
          answers: [
            "Orientation est ou nord-est, étage élevé, appartement d'angle",
          ],
        },
        { english: "There.", answers: ["Là", "Voilà"] },
        {
          english:
            "The view will be magnificent — the Andaman Sea and the green hills.",
          answers: [
            "La vue sera magnifique — la mer d'Andaman et les collines verdoyantes",
            "La vue sera magnifique, la mer d'Andaman et les collines verdoyantes",
          ],
        },
        { english: "I can't wait.", answers: ["J'ai hâte", "J'ai trop hâte"] },
        {
          english: "But apparently mosquitoes and flies can't fly that high.",
          answers: [
            "Mais il paraît que les moustiques et les mouches, ça peut pas voler si haut",
            "Mais il paraît que les moustiques et les mouches, ça ne peut pas voler si haut",
          ],
        },
        {
          english: "With your help, I'll manage a few more years at the stove.",
          answers: [
            "Avec ton aide, je tiendrai encore quelques années aux fourneaux",
          ],
        },
      ];
    </script>
