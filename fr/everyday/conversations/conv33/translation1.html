    <script>
      const questions = [
        {
          english: "I imagine we'll get delivery more often.",
          answers: [
            "J'imagine qu'on se fera livrer plus souvent",
            "J'imagine qu'on va se faire livrer plus souvent",
          ],
        },
        {
          english: "Otherwise, you have to pay for Grab.",
          answers: [
            "Sinon, faut payer le Grab",
            "Sinon, il faut payer le Grab",
          ],
        },
        {
          english: "Super convenient.",
          answers: ["Super pratiques", "Super pratique"],
        },
        {
          english: "We'll have to get used to everything.",
          answers: [
            "Il va falloir s'habituer à tout",
            "Va falloir s'habituer à tout",
          ],
        },
        {
          english: "We'll be able to have breakfast on the balcony.",
          answers: [
            "On pourra prendre le petit-déj sur le balcon",
            "On pourra prendre le petit-déjeuner sur le balcon",
          ],
        },
        {
          english: "We can't afford to lose any more.",
          answers: [
            "On peut pas se permettre d'en perdre plus",
            "On ne peut pas se permettre d'en perdre plus",
          ],
        },
        {
          english: "The hot food will be packed in plastic, though.",
          answers: [
            "La bouffe chaude sera emballée dans du plastique, par contre",
          ],
        },
        {
          english: "Cooking ourselves is healthiest.",
          answers: [
            "Cuisiner nous-mêmes, c'est le plus sain",
            "Cuisiner nous-mêmes, c'est ce qu'il y a de plus sain",
          ],
        },
        {
          english: "We might have to put in the mosquito screens ourselves.",
          answers: [
            "Faudra peut-être poser les moustiquaires nous-mêmes",
            "Il faudra peut-être poser les moustiquaires nous-mêmes",
          ],
        },
        {
          english: "We need to put AC in the humid kitchen.",
          answers: [
            "Faut mettre la clim dans la cuisine humide",
            "Il faut mettre la clim dans la cuisine humide",
          ],
        },
      ];
