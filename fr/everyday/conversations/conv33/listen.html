<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Dictation - 10 Levels</title>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>

    <script>

      gtag("js", new Date());

      gtag("config", "G-CHXHM9CZKM");

    <!-- Favicons -->
    <link href="/img/favicon.png" rel="icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
      }

      .dictation-card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        width: 100%;
      }

      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 10px;
      }

      /* Level Controls */
      .level-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        background: #f8f9fa;
        padding: 10px;
        border-radius: 8px;
      }

      .level-btn {
        background: white;
        border: 1px solid #dcdcdc;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        color: #7f8c8d;
        transition: all 0.2s;
      }
      .level-btn:hover {
        background: #ecf0f1;
        color: #2c3e50;
      }
      .level-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .level-indicator {
        font-weight: bold;
        color: #3498db;
        text-transform: uppercase;
        font-size: 0.9rem;
      }

      /* Audio Controls */
      .audio-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }

      .btn-audio {
        background: #e1f5fe;
        color: #0288d1;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-audio:hover {
        background: #b3e5fc;
        transform: scale(1.05);
      }
      .btn-slow {
        background: #fff3e0;
        color: #f57c00;
      }
      .btn-slow:hover {
        background: #ffe0b2;
      }

      .btn-hint {
        background: #f3e5f5;
        color: #8e24aa;
      }
      .btn-hint:hover {
        background: #e1bee7;
      }

      #player {
        display: none;
      }

      .hint-box {
        display: none;
        margin: -10px 0 20px;
        padding: 12px 15px;
        border-radius: 8px;
        background: #f3e5f5;
        color: #6a1b9a;
        font-style: italic;
        text-align: center;
      }
      .hint-box.visible {
        display: block;
      }

      textarea {
        width: 100%;
        height: 80px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1.1rem;
        font-family: "Segoe UI", sans-serif;
        resize: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }

      textarea:focus {
        outline: none;
        border-color: #3498db;
      }

      .feedback-area {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background: #fafafa;
        border: 1px dashed #ccc;
        min-height: 40px;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      /* Diff Styling */
      .diff-correct {
        color: #27ae60;
        font-weight: bold;
      }
      .diff-missing {
        color: #c0392b;
        text-decoration: line-through;
        opacity: 0.6;
        margin-right: 5px;
      }
      .diff-added {
        color: #2980b9;
        text-decoration: underline;
        font-weight: bold;
      }

      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }

      button.action-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }

      .btn-check {
        background: #2ecc71;
        color: white;
      }
      .btn-check:hover {
        background: #27ae60;
      }
      .btn-reveal {
        background: #f39c12;
        color: white;
      }
      .btn-reset {
        background: #95a5a6;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="dictation-card">
      <h2>🎧 Listening Lab</h2>

      <div class="level-bar">
        <button class="level-btn" id="prev-btn" onclick="changeLevel(-1)">
          ◀ Prev
        </button>
        <span class="level-indicator" id="level-display">Level 1 / 10</span>
        <button class="level-btn" id="next-btn" onclick="changeLevel(1)">
          Next ▶
        </button>
      </div>

      <div class="audio-controls">
        <button class="btn-audio" onclick="playAudio('m')">
          <span>👨</span> Male
        </button>
        <button class="btn-audio btn-slow" onclick="playAudio('f')">
          <span>👩</span> Female
        </button>
        <button class="btn-audio btn-hint" onclick="toggleHint()">
          <span>💡</span> Hint
        </button>
      </div>

      <audio id="player"></audio>

      <div class="hint-box" id="hint-box"></div>

      <textarea id="user-input" placeholder="Type what you hear..."></textarea>

      <div id="feedback" class="feedback-area">
        <span style="color: #aaa; font-style: italic"
          >Feedback will appear here...</span
        >
      </div>

      <div class="controls">
        <button class="action-btn btn-check" onclick="checkDictation()">
          Check
        </button>
        <button class="action-btn btn-reset" onclick="resetDictation()">
          Reset
        </button>
        <button class="action-btn btn-reveal" onclick="revealAnswer()">
          Reveal
        </button>
      </div>
    </div>

    <script>
      // 1. The Dataset (shuffled into random order; audioNums maps each entry
      // back to its original conversation position for the audio filenames)
      const sentences = [
        "Le chlore, c'est pas bon pour les cheveux.",
        "Pour panacher les stands emblématiques des quatre coins de l'île, on peut utiliser iOnefood.",
        "Sinon, faut payer le Grab.",
        "Orientation est ou nord-est, étage élevé, appartement d'angle…",
        "J'essaie d'imaginer l'effet que ça ferait de vivre en hauteur.",
        "On l'a jamais fait.",
        "Faut mettre la clim dans la cuisine humide.",
        "J'ai hâte.",
        "Il nous faudra une bonne à demeure avant ça, pour lui apprendre nos plats préférés.",
        "Gemini a dit qu'on peut commander sur Grabfood et Foodpanda.",
        "La bouffe chaude sera emballée dans du plastique, par contre.",
        "Super pratiques.",
        "Le Grab, ça revient peut-être plus cher.",
        "Qu'est-ce qui va te manquer le plus de l'Amérique ?",
        "Il va falloir s'habituer à tout.",
        "Ça sert à plein de choses, un mari.",
        "Je pensais à la Malaisie.",
        "On verra.",
        "On devra peut-être installer un pommeau de douche filtrant.",
        "Je sais pas si les stands de hawker livrent.",
        "Ce sera les vacances tous les jours.",
        "Il paraît qu'il y a beaucoup de chlore dans l'eau.",
        "On pourra prendre le petit-déj sur le balcon.",
        "Mais l'agencement d'Alila2 est bien mieux — plus ouvert, plus d'espace.",
        "La vue sera magnifique — la mer d'Andaman et les collines verdoyantes.",
        "C'est à prendre en compte.",
        "Ils volent mal, ils sont trop faibles.",
        "Tu peux me gratter le dos ?",
        "Avec ton aide, je tiendrai encore quelques années aux fourneaux.",
        "Alors on en aura peut-être pas besoin.",
        "On pourra jamais cuisiner dans cette chaleur et cette humidité.",
        "Ce serait sympa.",
        "On peut pas se permettre d'en perdre plus.",
        "Costco et Amazon.",
        "Mais faut être réaliste sur combien de temps tu pourras encore cuisiner, à ton âge.",
        "De toute façon, on mangera pas beaucoup dehors.",
        "Là.",
        "Aller en ville, c'est un peu plus loin depuis Alila2 que depuis Andaman@Quayside.",
        "On va demander à Gemini.",
        "Qu'est-ce qu'il nous faut d'autre ?",
        "Non, plus haut, un peu à gauche, un peu plus bas.",
        "Ça fait du bien.",
        "Manger sur place, c'est le mieux, mais avec la chaleur, c'est pas toujours pratique.",
        "J'imagine qu'on se fera livrer plus souvent.",
        "Mais il paraît que les moustiques et les mouches, ça peut pas voler si haut.",
        "Faudra peut-être poser les moustiquaires nous-mêmes.",
        "Tu veux dire, corvéable à merci.",
        "Cuisiner nous-mêmes, c'est le plus sain.",
        "La cuisine est immense.",
      ];

      const translations = [
        "Chlorine isn't good for hair.",
        "To mix and match iconic stalls from all corners of the island, we can use iOnefood.",
        "Otherwise, you have to pay for Grab.",
        "East or northeast facing, high floor, corner unit…",
        "I'm trying to imagine what it would feel like to live up high.",
        "We've never done that.",
        "We need to put AC in the humid kitchen.",
        "I can't wait.",
        "We'll need a live-in housekeeper before that, to teach her our favorite dishes.",
        "Gemini said we can order on Grabfood and Foodpanda.",
        "The hot food will be packed in plastic, though.",
        "Super convenient.",
        "Grab might end up costing more.",
        "What are you going to miss most about America?",
        "We'll have to get used to everything.",
        "A husband is good for lots of things.",
        "I was thinking about Malaysia.",
        "We'll see.",
        "We might need to install a filtering showerhead.",
        "I don't know if the hawker stalls deliver.",
        "It'll be like vacation every day.",
        "Apparently there's a lot of chlorine in the water.",
        "We'll be able to have breakfast on the balcony.",
        "But Alila2's layout is much better — more open, more space.",
        "The view will be magnificent — the Andaman Sea and the green hills.",
        "That's something to keep in mind.",
        "They're weak fliers.",
        "Can you scratch my back?",
        "With your help, I'll manage a few more years at the stove.",
        "Then maybe we won't need them.",
        "We could never cook in that heat and humidity.",
        "That would be nice.",
        "We can't afford to lose any more.",
        "Costco and Amazon.",
        "But we need to be realistic about how much longer you'll be able to cook, at your age.",
        "Anyway, we won't eat out much.",
        "There.",
        "Going into town is a bit farther from Alila2 than from Andaman@Quayside.",
        "Let's ask Gemini.",
        "What else do we need?",
        "No, higher, a little to the left, a little lower.",
        "That feels good.",
        "Eating on the spot is best, but with the heat, it's not always practical.",
        "I imagine we'll get delivery more often.",
        "But apparently mosquitoes and flies can't fly that high.",
        "We might have to put in the mosquito screens ourselves.",
        "You mean, at your total beck and call.",
        "Cooking ourselves is healthiest.",
        "The kitchen is huge.",
      ];

      // Original 1-based conversation index for each shuffled entry above,
      // since the pre-recorded audio files are named after conversation order.
      const audioNums = [
        19, 38, 33, 8, 22, 23, 14, 28, 45, 37, 39, 49, 34, 47, 21, 5, 7, 13, 18,
        35, 27, 17, 25, 30, 24, 40, 11, 1, 46, 12, 15, 26, 20, 48, 44, 42, 2,
        29, 36, 16, 3, 4, 41, 32, 10, 9, 6, 43, 31,
      ];

      let currentIndex = 0;

      // 2. Navigation Logic
      function changeLevel(direction) {
        currentIndex += direction;

        // Bounds checking
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= sentences.length)
          currentIndex = sentences.length - 1;

        updateUI();
        resetDictation(); // Clear previous inputs
      }

      function updateUI() {
        document.getElementById("level-display").innerText =
          `Level ${currentIndex + 1} / ${sentences.length}`;

        // Disable buttons at ends
        document.getElementById("prev-btn").disabled = currentIndex === 0;
        document.getElementById("next-btn").disabled =
          currentIndex === sentences.length - 1;
      }

      // 3. Audio Logic
      const audioBase =
        "https://languages.rmlives.com/lessons/everyday/conv33/listen/";

      function playAudio(gender) {
        const num = String(audioNums[currentIndex]).padStart(2, "0");
        const player = document.getElementById("player");
        player.src = `${audioBase}${num}-${gender}.mp3`;
        player.play();
      }

      // 4. Checking Logic
      function checkDictation() {
        const userText = document.getElementById("user-input").value.trim();
        const feedbackDiv = document.getElementById("feedback");

        if (!userText) {
          feedbackDiv.innerHTML =
            '<span style="color:#e74c3c">Please type something first!</span>';
          return;
        }
        feedbackDiv.innerHTML = compareStrings(
          sentences[currentIndex],
          userText,
        );
      }

      function revealAnswer() {
        document.getElementById("user-input").value = sentences[currentIndex];
        checkDictation();
      }

      function resetDictation() {
        document.getElementById("user-input").value = "";
        document.getElementById("feedback").innerHTML =
          '<span style="color:#aaa; font-style:italic;">Feedback will appear here...</span>';

        const hintBox = document.getElementById("hint-box");
        hintBox.classList.remove("visible");
        hintBox.innerText = "";
      }

      function toggleHint() {
        const hintBox = document.getElementById("hint-box");
        if (hintBox.classList.contains("visible")) {
          hintBox.classList.remove("visible");
        } else {
          hintBox.innerText = translations[currentIndex];
          hintBox.classList.add("visible");
        }
      }

      // 5. Diff Algorithm
      function compareStrings(correct, user) {
        let html = "";
        const correctWords = correct.split(" ");
        const userWords = user.split(" ");
        const maxLength = Math.max(correctWords.length, userWords.length);

        for (let i = 0; i < maxLength; i++) {
          const cWord = correctWords[i] || "";
          const uWord = userWords[i] || "";

          // Normalize for comparison (remove punctuation, lower case)
          const cleanC = cWord.toLowerCase().replace(/[.,?]/g, "");
          const cleanU = uWord.toLowerCase().replace(/[.,?]/g, "");

          if (cleanC === cleanU) {
            html += `<span class="diff-correct">${cWord}</span> `;
          } else {
            if (cWord) html += `<span class="diff-added">${cWord}</span> `;
            if (uWord) html += `<span class="diff-missing">${uWord}</span> `;
          }
        }
        return html;
      }

      // Init
      updateUI();
    </script>
    <script src="exercise-feedback.js"></script>
    <script type="module" src="../../../../assets/js/nav-utensils.js"></script>
  </body>
</html>
