<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conv 26 Flashcards – Le poids et la mise en forme</title>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-CHXHM9CZKM");
    </script>

    <!-- Favicons -->
    <link href="/img/favicon.png" rel="icon" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-color: #2c3e50;
        --accent-color: #3498db;
        --card-height: 320px;
        --card-width: 500px;
        --bg-color: #f0f2f5;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      h1 {
        font-size: 1.4rem;
        color: var(--primary-color);
        text-align: center;
        margin-bottom: 30px;
      }

      .flashcard-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 600px;
      }

      .progress-container {
        width: 100%;
        margin-bottom: 25px;
        text-align: center;
        color: #666;
        font-weight: 600;
      }

      .progress-bar-bg {
        width: 100%;
        height: 8px;
        background: #dfe6e9;
        border-radius: 4px;
        margin-top: 8px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: var(--accent-color);
        width: 0%;
        transition: width 0.3s ease;
      }

      .card-scene {
        perspective: 1000px;
        width: var(--card-width);
        height: var(--card-height);
        cursor: pointer;
        margin-bottom: 30px;
      }

      .card {
        width: 100%;
        height: 100%;
        position: relative;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        transform-style: preserve-3d;
      }

      .card.is-flipped {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
        box-sizing: border-box;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        font-size: 1.3rem;
        text-align: center;
        line-height: 1.5;
      }

      .card-front {
        background: #ffffff;
        color: #2d3436;
        border: 1px solid #e1e1e1;
      }

      .card-label {
        position: absolute;
        top: 20px;
        left: 25px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #b2bec3;
        font-weight: 700;
      }

      .hint-text {
        position: absolute;
        bottom: 20px;
        font-size: 0.85rem;
        color: #b2bec3;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .card-back {
        background: #ffffff;
        color: var(--primary-color);
        transform: rotateY(180deg);
        border-bottom: 6px solid var(--accent-color);
        border-top: 1px solid #eee;
        border-left: 1px solid #eee;
        border-right: 1px solid #eee;
      }

      .audio-btn {
        margin-top: 16px;
        padding: 8px 20px;
        background: var(--accent-color);
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        transition: all 0.2s ease;
      }

      .audio-btn:hover {
        background: #2980b9;
      }

      .controls-area {
        display: flex;
        gap: 20px;
        width: 100%;
        justify-content: center;
      }

      .nav-btn {
        padding: 12px 30px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .nav-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        background: #34495e;
      }

      .nav-btn:active {
        transform: scale(0.98);
      }

      .kb-hint {
        font-size: 0.9rem;
        color: #95a5a6;
        margin-top: 25px;
        font-family: monospace;
      }

      @media (max-width: 600px) {
        .card-scene {
          width: 90vw;
          height: 400px;
        }

        .card-face {
          padding: 25px;
          font-size: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <h1>Conv 26 – Le poids et la mise en forme</h1>

    <div class="flashcard-wrapper">
      <div class="progress-container">
        <span id="progress-text">Card 1 / 26</span>
        <div class="progress-bar-bg">
          <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
      </div>

      <div class="card-scene">
        <div class="card" id="flashcard" onclick="flipCard()">
          <div class="card-face card-front">
            <span class="card-label">English</span>
            <div class="card-content" id="card-front-text"></div>
            <div class="hint-text">↻ Tap to flip</div>
          </div>

          <div class="card-face card-back">
            <span class="card-label">Français</span>
            <div class="card-content" id="card-back-text"></div>
            <button class="audio-btn" onclick="playAudio(event)">
              ▶ Play
            </button>
          </div>
        </div>
      </div>

      <div class="controls-area">
        <button class="nav-btn" onclick="prevCard()">← Prev</button>
        <button class="nav-btn" onclick="nextCard()">Next →</button>
      </div>

      <p class="kb-hint">Spacebar: Flip &nbsp;•&nbsp; Arrows: Navigate</p>
    </div>

    <script>
      const BASE_URL =
        "https://languages.rmlives.com/lessons/everyday/260627/Anki/";

      const flashcardData = [
        {
          en: "How do I go about it? / How should I tackle this?",
          fr: "Je m'y prends comment ?",
          audio: "01.mp3",
        },
        {
          en: "I need to do something (il faut que + subjunctive)",
          fr: "Faut que je fasse quelque chose",
          audio: "02.mp3",
        },
        {
          en: "and fast! / and quick!",
          fr: "Et vite !",
          audio: "03.mp3",
        },
        {
          en: "to take it slow / to ease into it",
          fr: "y aller doucement",
          audio: "04.mp3",
        },
        {
          en: "no matter… / whatever… (+ noun)",
          fr: "peu importe…",
          audio: "05.mp3",
        },
        {
          en: "whatever version it is / no matter the version",
          fr: "peu importe la version",
          audio: "06.mp3",
        },
        {
          en: "that works / that fits nicely",
          fr: "ça colle bien",
          audio: "07.mp3",
        },
        {
          en: "the crazy thing is… (set opener)",
          fr: "le truc dingue, c'est que…",
          audio: "08.mp3",
        },
        {
          en: "to last / to stand the test of time",
          fr: "tenir dans le temps",
          audio: "09.mp3",
        },
        {
          en: "to fit that into my daily routine",
          fr: "caser ça dans mon quotidien",
          audio: "10.mp3",
        },
        {
          en: "in my day-to-day / in my daily life",
          fr: "dans mon quotidien",
          audio: "11.mp3",
        },
        {
          en: "my clothes are tight on me (colloquial)",
          fr: "mes fringues me serrent",
          audio: "12.mp3",
        },
        {
          en: "to buy a whole new wardrobe",
          fr: "racheter toute ma garde-robe",
          audio: "13.mp3",
        },
        {
          en: "to fit into a pair of jeans",
          fr: "rentrer dans un jean",
          audio: "14.mp3",
        },
        {
          en: "every other day",
          fr: "un jour sur deux",
          audio: "15.mp3",
        },
        {
          en: "I just don't have the energy anymore (ne dropped)",
          fr: "j'ai juste plus d'énergie",
          audio: "16.mp3",
        },
        {
          en: "to exercise / to do sport / to work out",
          fr: "faire du sport",
          audio: "17.mp3",
        },
        {
          en: "I'm gaining weight",
          fr: "je grossis",
          audio: "18.mp3",
        },
        {
          en: "enough… (+ noun)",
          fr: "assez de…",
          audio: "19.mp3",
        },
        {
          en: "about / roughly (after a duration)",
          fr: "… environ",
          audio: "20.mp3",
        },
        {
          en: "a range (of) – figurative",
          fr: "une fourchette (de)",
          audio: "21.mp3",
        },
        {
          en: "the preparations for…",
          fr: "les préparatifs de…",
          audio: "22.mp3",
        },
        {
          en: "the move / the relocation",
          fr: "le déménagement",
          audio: "23.mp3",
        },
        {
          en: "to slim down / to refine (a body part, a design)",
          fr: "affiner",
          audio: "24.mp3",
        },
        {
          en: "to tone up / to firm up",
          fr: "raffermir",
          audio: "25.mp3",
        },
        {
          en: "I weigh… / I'm… (je fais + measurement)",
          fr: "je fais… (53,7 kg, 1m70…)",
          audio: "26.mp3",
        },
      ];

      let currentIndex = 0;

      const cardElement = document.getElementById("flashcard");
      const frontText = document.getElementById("card-front-text");
      const backText = document.getElementById("card-back-text");
      const progressText = document.getElementById("progress-text");
      const progressFill = document.getElementById("progress-fill");

      function init() {
        loadCard(currentIndex);
      }

      function loadCard(index) {
        if (index < 0) index = 0;
        if (index >= flashcardData.length) index = flashcardData.length - 1;

        currentIndex = index;
        cardElement.classList.remove("is-flipped");

        setTimeout(() => {
          const item = flashcardData[currentIndex];
          frontText.innerText = item.en;
          backText.innerText = item.fr;
          updateProgress();
        }, 200);
      }

      function flipCard() {
        cardElement.classList.toggle("is-flipped");
      }

      function playAudio(event) {
        event.stopPropagation();
        const item = flashcardData[currentIndex];
        const audio = new Audio(BASE_URL + item.audio);
        audio.play().catch((e) => console.log("Audio not found: " + e));
      }

      function nextCard() {
        if (currentIndex < flashcardData.length - 1) {
          loadCard(currentIndex + 1);
        } else {
          progressText.style.color = "red";
          setTimeout(() => (progressText.style.color = "#666"), 500);
        }
      }

      function prevCard() {
        if (currentIndex > 0) {
          loadCard(currentIndex - 1);
        }
      }

      function updateProgress() {
        const current = currentIndex + 1;
        const total = flashcardData.length;
        progressText.innerText = `Card ${current} / ${total}`;
        const percentage = (current / total) * 100;
        progressFill.style.width = `${percentage}%`;
      }

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          flipCard();
        } else if (e.code === "ArrowRight") {
          nextCard();
        } else if (e.code === "ArrowLeft") {
          prevCard();
        }
      });

      init();
    </script>
  </body>
</html>
