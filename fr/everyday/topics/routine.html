<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Routines - French A2/B1</title>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-CHXHM9CZKM");
    </script>

    <!-- Favicons -->
    <link href="/img/favicon.png" rel="icon" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
      body {
        background-color: #f4f4f9;
      }

      /* --- Chat Bubble Styling --- */
      /* We interpret Blockquotes ( > text ) as AI/System responses */
      blockquote {
        background: #ffffff;
        border-left: 5px solid #6c5ce7; /* Purple accent */
        margin: 1.5em 0;
        padding: 15px 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        color: #333;
      }

      /* Styling for standard text (The "User" prompts) */
      p {
        margin-bottom: 1em;
        color: #2d3436;
      }

      /* Make "User:" or names bold and distinct */
      strong {
        color: #d63031; /* Red accent for names */
      }

      /* Code Block Styling */
      pre {
        background: #2d3436;
        color: #dfe6e9;
        padding: 15px;
        border-radius: 5px;
        overflow-x: auto;
      }

      /* Table Styling */
      table {
        width: 100%;
        margin-bottom: 1.5rem;
        border-collapse: collapse;
        background-color: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }
      th,
      td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #e9ecef;
      }
      th {
        background-color: #0174c1;
        color: #ffffff;
      }
      /* Hover effect for audio elements */
      .audio-trigger:hover {
        background-color: #e2e6ea;
      }

      /* Floating Audio Player */
      .btn-audio {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: #fff;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .btn-audio:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        color: #fff;
      }
      #audioPlayerWindow {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 280px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        z-index: 1050;
        display: none;
      }
      #audioPlayerHeader {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        padding: 12px 15px;
        border-radius: 12px 12px 0 0;
        cursor: move;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
      }
      #closeAudio {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: #fff;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        transition: background 0.3s;
      }
      #closeAudio:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      #audioPlayerControls {
        padding: 20px;
        text-align: center;
      }
      #audioPlayerControls button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: #fff;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        font-size: 1.2rem;
        margin: 0 8px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      #audioPlayerControls button:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }
      #audioPlayerNote {
        padding: 0 15px 15px 15px;
        font-size: 0.8rem;
        color: #666;
        text-align: center;
      }
      @media (max-width: 576px) {
        #audioPlayerWindow {
          width: calc(100% - 40px);
          left: 20px;
          right: 20px;
        }
      }

      /* Examples button styling */
      .examples-btn {
        background: none;
        border: 1px solid #0174c1;
        color: #0174c1;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.8em;
        cursor: pointer;
        margin-top: 4px;
        display: inline-block;
      }
      .examples-btn:hover {
        background: #0174c1;
        color: white;
      }
      .examples-panel {
        display: none;
        margin-top: 6px;
        color: #555;
        font-size: 0.9em;
      }
      .examples-panel.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <a
        href="../../index.html"
        target="_blank"
        class="btn btn-secondary mb-3"
        >Site Map</a
      >
      <button id="openAudio" type="button" class="btn btn-audio mb-3 ms-2">
        🔊 Audio Player
      </button>

      <div id="audioPlayerWindow">
        <div id="audioPlayerHeader">
          <span>🎵 Audio Player</span>
          <button id="closeAudio" type="button">&times;</button>
        </div>
        <div id="audioPlayerControls">
          <button id="playBtn" title="Play" type="button">&#9658;</button>
          <button id="pauseBtn" title="Pause" type="button">
            &#10074;&#10074;
          </button>
          <button id="stopBtn" title="Stop" type="button">&#9632;</button>
        </div>
        <div id="audioPlayerNote">Text-to-speech playback</div>
      </div>

      <div class="mx-auto" style="max-width: 700px">
        <img
          src="/img/everyday/routine.jpg"
          alt=""
          class="img-fluid mb-4 rounded d-block mx-auto"
        />
      </div>

      <div id="content">Loading routine...</div>
    </div>

    <script>
      // Global function to play audio using speechSynthesis
      function playAudio(text) {
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = "fr-FR";
          utterance.rate = 0.9;

          const voices = window.speechSynthesis.getVoices();
          const frenchVoice = voices.find((voice) =>
            voice.lang.startsWith("fr"),
          );
          if (frenchVoice) {
            utterance.voice = frenchVoice;
          }

          window.speechSynthesis.speak(utterance);
          const audioWindow = document.getElementById("audioPlayerWindow");
          if (audioWindow) {
            audioWindow.style.display = "block";
          }
        }
      }

      // Pre-load voices
      if ("speechSynthesis" in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = function () {
          window.speechSynthesis.getVoices();
        };
      }

      // Audio player controls (play / pause / stop / drag)
      document.addEventListener("DOMContentLoaded", () => {
        const openAudioBtn = document.getElementById("openAudio");
        const closeAudioBtn = document.getElementById("closeAudio");
        const audioWindow = document.getElementById("audioPlayerWindow");
        const playBtn = document.getElementById("playBtn");
        const pauseBtn = document.getElementById("pauseBtn");
        const stopBtn = document.getElementById("stopBtn");

        openAudioBtn.addEventListener("click", () => {
          audioWindow.style.display = "block";
        });

        closeAudioBtn.addEventListener("click", () => {
          audioWindow.style.display = "none";
          if ("speechSynthesis" in window) {
            window.speechSynthesis.cancel();
          }
        });

        playBtn.addEventListener("click", () => {
          if ("speechSynthesis" in window && window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
          }
        });

        pauseBtn.addEventListener("click", () => {
          if ("speechSynthesis" in window) {
            window.speechSynthesis.pause();
          }
        });

        stopBtn.addEventListener("click", () => {
          if ("speechSynthesis" in window) {
            window.speechSynthesis.cancel();
          }
        });

        // Draggable player window
        let isDragging = false;
        let currentX = 0,
          currentY = 0,
          initialX = 0,
          initialY = 0,
          xOffset = 0,
          yOffset = 0;
        const header = document.getElementById("audioPlayerHeader");

        header.addEventListener("mousedown", (e) => {
          initialX = e.clientX - xOffset;
          initialY = e.clientY - yOffset;
          if (e.target === header || header.contains(e.target)) {
            isDragging = true;
          }
        });

        document.addEventListener("mousemove", (e) => {
          if (isDragging) {
            e.preventDefault();
            currentX = e.clientX - initialX;
            currentY = e.clientY - initialY;
            xOffset = currentX;
            yOffset = currentY;
            audioWindow.style.transform = `translate(${currentX}px, ${currentY}px)`;
          }
        });

        document.addEventListener("mouseup", () => {
          initialX = currentX;
          initialY = currentY;
          isDragging = false;
        });
      });

      // 1. Fetch the markdown file
      fetch("routine.md")
        .then((response) => {
          if (!response.ok) {
            throw new Error("Could not find routine.md file");
          }
          return response.text();
        })
        .then((text) => {
          // 2. Convert markdown to HTML using Marked.js
          document.getElementById("content").innerHTML = marked.parse(text);

          // 3. Post-processing: Add cursor pointer to elements with onclick
          document.querySelectorAll("[onclick^='playAudio']").forEach((el) => {
            el.style.cursor = "pointer";
            el.classList.add("audio-trigger");
          });

          // 4. Add click handlers for examples buttons
          document.querySelectorAll(".examples-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
              var panel = document.getElementById(this.dataset.target);
              if (panel) {
                panel.classList.toggle("visible");
              }
            });
          });
        })
        .catch((error) => {
          document.getElementById("content").innerHTML =
            `<p style="color:red; font-weight:bold;">Error: ${error.message}. <br>
                    (Note: You must view this via a local server, not by double-clicking the file.)</p>`;
        });
    </script>
  </body>
</html>
