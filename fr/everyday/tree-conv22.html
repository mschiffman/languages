<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mind Map - Conversation 22</title>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CHXHM9CZKM"
    ></script>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-CHXHM9CZKM");
    </script>

    <!-- Favicons -->
    <link href="/img/favicon.png" rel="icon" />

    <link rel="stylesheet" href="../../assets/css/tree.css" />
  </head>

  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.2.2/d3.min.js"></script>
    <script>
      var treeData = {
        name: "Conversation 22",
        children: [
          {
            name: "L'aide et les mains sales",
            style: { stroke: "#007850", fill: "#007850" },
            children: [
              { name: "Besoin d'aide - I need help" },
              { name: "Tout à l'heure - earlier" },
              { name: "C'est autre chose - it's something else" },
              {
                name: "Mettre la vitamine dans la bouche - put the vitamin in the mouth",
              },
              { name: "Les mains sales - dirty hands" },
              { name: "Casse-pieds - pain in the neck, annoying" },
            ],
          },
          {
            name: "Les plantes et la chaleur",
            style: { stroke: "#e07b39", fill: "#e07b39" },
            children: [
              { name: "Se comporter - to behave, to handle it" },
              {
                name: "Quand il fera 100 degrés - when it gets to 100 degrees",
              },
              { name: "Arroser deux fois par jour - water twice a day" },
              {
                name: "Si elles crèvent, elles crèvent - if they die, they die",
              },
              { name: "J'en ai plus rien à faire - I don't care anymore" },
              { name: "En pleine terre - in the ground" },
              { name: "Les plantes en pot - potted plants" },
              { name: "Tant pis pour elles - too bad for them" },
            ],
          },
          {
            name: "Le dîner",
            style: { stroke: "#9e2a00", fill: "#9e2a00" },
            children: [
              {
                name: "Les pommes de terre japonaises violettes - Japanese purple potatoes",
              },
              { name: "La soupe miso - miso soup" },
              {
                name: "Le gailan avec des champignons - gailan with mushrooms",
              },
              { name: "Carrément - absolutely, totally" },
              { name: "Un plat étoilé Michelin - a Michelin-starred dish" },
              { name: "Deux cuisses de poulet - two chicken thighs" },
              { name: "Pour accompagner - to go with it, as a side" },
            ],
          },
          {
            name: "La vaisselle et l'amour",
            style: { stroke: "#0070a8", fill: "#0070a8" },
            children: [
              { name: "Épuisé(e) - exhausted" },
              { name: "La vaisselle - the dishes" },
              { name: "Une vraie preuve d'amour - a real act of love" },
              { name: "Prouver mon amour - to prove my love" },
              { name: "Un amour modéré - moderate love" },
              { name: "M'étouffer - to smother me" },
            ],
          },
          {
            name: "Les snacks indiens",
            style: { stroke: "#7b02b5", fill: "#7b02b5" },
            children: [
              { name: "Les snacks indiens - Indian snacks" },
              { name: "Quand on était petits - when we were little" },
              {
                name: "T'aimeras peut-être plus ça - you might not like them anymore",
              },
              { name: "Ça fait longtemps - it's been a long time" },
              { name: "Les goûts changent - tastes change" },
              { name: "Grignoter quelque chose - to snack on something" },
              { name: "Rien d'extraordinaire - nothing extraordinary" },
            ],
          },
          {
            name: "Expressions utiles",
            style: { stroke: "#006666", fill: "#006666" },
            children: [
              { name: "T'as besoin de quoi ? - what do you need?" },
              { name: "Elles s'en sont bien sorties - they did fine" },
              {
                name: "C'est exactement ce que je pense - that's exactly what I think",
              },
              { name: "Comme tu veux - whatever you want" },
              {
                name: "Je peux pas te promettre ça - I can't promise you that",
              },
              { name: "Pareil pour moi - same for me" },
            ],
          },
        ],
      };

      var colors = {
        node: {
          rootFill: "#1d03e1ff",
          defaultFill: "rgb(39, 43, 77)",
          strokeHasChildren: "rgb(3, 192, 220)",
          strokeLeaf: "rgba(222, 38, 173, 1)",
        },
        text: {
          root: "rgba(255, 255, 255, 1)",
          hasChildren: "#ffffff",
          leaf: "rgba(255, 255, 255, 1)",
        },
        link: "#ccc",
      };

      var margin = { top: 20, right: 90, bottom: 30, left: 90 },
        width = 960 - margin.left - margin.right,
        height = 500 - margin.top - margin.bottom;

      document.addEventListener("DOMContentLoaded", function () {
        var svgSelection = d3
          .select("body")
          .append("svg")
          .attr("width", "100vw")
          .attr("height", "100vh");

        var svg = svgSelection
          .append("g")
          .attr(
            "transform",
            "translate(" + margin.left + "," + margin.top + ")",
          );

        var zoom = d3.zoom().on("zoom", function () {
          svg.attr("transform", d3.event.transform);
        });

        svgSelection
          .call(zoom)
          .call(
            zoom.transform,
            d3.zoomIdentity.translate(margin.left, margin.top),
          );

        var i = 0,
          duration = 750,
          root;
        var treemap = d3.tree().nodeSize([40, 180]);
        root = d3.hierarchy(treeData, function (d) {
          return d.children;
        });
        root.x0 = height / 2;
        root.y0 = 0;
        root.children.forEach(collapse);

        update(root);

        function collapse(d) {
          if (d.children) {
            d._children = d.children;
            d._children.forEach(collapse);
            d.children = null;
          }
        }

        function update(source) {
          var treeData = treemap(root);
          var nodes = treeData.descendants(),
            links = treeData.descendants().slice(1);
          nodes.forEach(function (d) {
            d.x = d.x + height / 2;
          });
          var node = svg.selectAll("g.node").data(nodes, function (d) {
            return d.id || (d.id = ++i);
          });
          var nodeEnter = node
            .enter()
            .append("g")
            .attr("class", "node")
            .attr("transform", function (d) {
              return "translate(" + source.y0 + "," + source.x0 + ")";
            })
            .on("click", click);
          nodeEnter
            .attr("class", "node")
            .attr("r", 1e-6)
            .style("fill", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.fill) return p.data.style.fill;
                p = p.parent;
              }
              return d.parent ? colors.node.defaultFill : colors.node.rootFill;
            });

          nodeEnter
            .append("text")
            .style("fill", function (d) {
              if (d.parent) {
                return d.children || d._children
                  ? colors.text.hasChildren
                  : colors.text.leaf;
              }
              return colors.text.root;
            })
            .attr("dy", ".35em")
            .attr("text-anchor", function (d) {
              return "middle";
            })
            .text(function (d) {
              return d.data.name;
            });

          nodeEnter.each(function (d) {
            var bbox = this.querySelector("text").getBBox();
            d.width = bbox.width + 20;
            d.height = bbox.height + 10;
          });

          var maxDepthWidth = [];
          nodes.forEach(function (d) {
            if (!maxDepthWidth[d.depth] || d.width > maxDepthWidth[d.depth]) {
              maxDepthWidth[d.depth] = d.width;
            }
          });
          var depthY = [0];
          for (var j = 1; j <= maxDepthWidth.length; j++) {
            depthY[j] = depthY[j - 1] + (maxDepthWidth[j - 1] || 0) + 80;
          }
          nodes.forEach(function (d) {
            d.y = depthY[d.depth];
          });

          nodeEnter
            .insert("rect", "text")
            .attr("rx", 6)
            .attr("ry", 6)
            .attr("stroke-width", function (d) {
              return d.parent ? 1 : 0;
            })
            .attr("stroke", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.stroke)
                  return p.data.style.stroke;
                p = p.parent;
              }
              return d.children || d._children
                ? colors.node.strokeHasChildren
                : colors.node.strokeLeaf;
            })
            .attr("stroke-dasharray", "0")
            .attr("stroke-opacity", function (d) {
              return d.children || d._children ? "1" : "0.6";
            })
            .attr("x", 0)
            .attr("y", function (d) {
              return -(d.height / 2);
            })
            .attr("width", function (d) {
              return d.width;
            })
            .attr("height", function (d) {
              return d.height;
            });

          nodeEnter.selectAll("text").attr("x", function (d) {
            return d.width / 2;
          });

          nodeEnter
            .filter(function (d) {
              return d.children || d._children;
            })
            .append("text")
            .attr("class", "plus-sign")
            .attr("x", function (d) {
              return d.width;
            })
            .attr("y", 0)
            .attr("dy", ".35em")
            .style("fill", "black")
            .attr("text-anchor", "middle")
            .text("+");

          var nodeUpdate = nodeEnter.merge(node);

          nodeUpdate.select(".plus-sign").style("display", function (d) {
            return d._children ? "inline" : "none";
          });

          nodeUpdate
            .transition()
            .duration(duration)
            .attr("transform", function (d) {
              return "translate(" + d.y + "," + d.x + ")";
            });
          var nodeExit = node
            .exit()
            .transition()
            .duration(duration)
            .attr("transform", function (d) {
              return "translate(" + source.y + "," + source.x + ")";
            })
            .remove();
          nodeExit.select("rect").style("opacity", 1e-6);
          nodeExit.select("rect").attr("stroke-opacity", 1e-6);
          nodeExit.selectAll("text").style("fill-opacity", 1e-6);
          var link = svg.selectAll("path.link").data(links, function (d) {
            return d.id;
          });
          var linkEnter = link
            .enter()
            .insert("path", "g")
            .attr("class", "link")
            .style("stroke", function (d) {
              var p = d;
              while (p) {
                if (p.data.style && p.data.style.stroke)
                  return p.data.style.stroke;
                p = p.parent;
              }
              return colors.link;
            })
            .attr("d", function (d) {
              var o = { x: source.x0, y: source.y0 };
              return diagonal(o, o);
            });
          var linkUpdate = linkEnter.merge(link);
          linkUpdate
            .transition()
            .duration(duration)
            .attr("d", function (d) {
              return diagonal(d, d.parent);
            });
          var linkExit = link
            .exit()
            .transition()
            .duration(duration)
            .attr("d", function (d) {
              var o = { x: source.x, y: source.y };
              return diagonal(o, o);
            })
            .remove();
          nodes.forEach(function (d) {
            d.x0 = d.x;
            d.y0 = d.y;
          });
          function diagonal(s, d) {
            var path = `M ${s.y} ${s.x}
                    C ${(s.y + d.y) / 2} ${s.x},
                      ${(s.y + d.y) / 2} ${d.x},
                      ${d.y} ${d.x}`;
            return path;
          }
          function click(d) {
            if (d.children) {
              d._children = d.children;
              d.children = null;
            } else {
              d.children = d._children;
              d._children = null;
              if (d.depth === 0 && d.children) {
                d.children.forEach(collapse);
              }
            }
            update(d);
          }
        }

        function expand(d) {
          if (d._children) {
            d.children = d._children;
            d._children = null;
          }
          if (d.children) {
            d.children.forEach(expand);
          }
        }

        var actionBar = d3
          .select("body")
          .append("div")
          .attr("class", "action-bar")
          .style("position", "fixed")
          .style("top", "10px")
          .style("left", "10px")
          .style("z-index", "1000")
          .style("display", "flex")
          .style("gap", "10px");

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-arrows-expand"></i> Expand All')
          .on("click", function () {
            expand(root);
            update(root);
          });

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-arrows-collapse"></i> Collapse All')
          .on("click", function () {
            root.children.forEach(collapse);
            update(root);
          });

        actionBar
          .append("button")
          .attr("class", "btn btn-sm btn-light border shadow-sm")
          .html('<i class="bi bi-aspect-ratio"></i> Reset Zoom')
          .on("click", function () {
            svgSelection
              .transition()
              .duration(750)
              .call(
                zoom.transform,
                d3.zoomIdentity.translate(margin.left, margin.top),
              );
          });
      });
    </script>
  </body>
</html>
